<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,interactive-widget=resizes-content"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Donna"/>
<link rel="apple-touch-startup-image" href="/icon.svg"/>
<meta name="theme-color" content="#0ec4b4" media="(prefers-color-scheme: dark)"/>
<meta name="theme-color" content="#0ec4b4" media="(prefers-color-scheme: light)"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon.svg"/>
<link rel="icon" type="image/svg+xml" href="/icon.svg"/>
<title>Donna — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg0:#060d1a;--bg1:#0a1424;--bg2:#0f1c30;--bg3:#152238;
  --border:#1c2f48;--border-hi:#243d5c;
  --teal:#0ec4b4;--teal-dim:rgba(14,196,180,0.12);--teal-mid:rgba(14,196,180,0.22);
  --green:#10d474;--green-dim:rgba(16,212,116,0.12);
  --amber:#f5a623;--amber-dim:rgba(245,166,35,0.12);
  --red:#f25c54;--red-dim:rgba(242,92,84,0.12);
  --yellow:#f5d623;--yellow-dim:rgba(245,214,35,0.10);
  --text-1:#dce8f5;--text-2:#7a96b8;--text-3:#4a6280;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --sidebar-w:268px;--tools-w:252px;
}
[data-theme="light"]{
  --bg0:#f0f2f5;--bg1:#ffffff;--bg2:#f5f7fa;--bg3:#eaecf0;
  --border:#dde1e8;--border-hi:#c8cdd8;
  --text-1:#0f1923;--text-2:#4d6070;--text-3:#8a9bb0;
  --teal-dim:rgba(14,196,180,0.10);--teal-mid:rgba(14,196,180,0.16);
  --green-dim:rgba(5,150,80,0.10);--red-dim:rgba(200,50,44,0.10);
  --amber-dim:rgba(180,110,0,0.10);--yellow-dim:rgba(180,160,0,0.10);
}
html,body,#root{height:100%;height:100dvh;overflow:hidden;background:var(--bg0);font-family:var(--sans);color:var(--text-1);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:4px;}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;}
input,textarea{font-family:var(--sans);}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes blink{0%,80%,100%{opacity:0.2;transform:scale(0.9);}40%{opacity:1;transform:scale(1.1);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.75;transform:scale(1.15);}}
@keyframes slideIn{from{transform:translateX(-100%);}to{transform:translateX(0);}}

/* ── DESKTOP layout ── */
.app-shell{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;}
.app-body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:var(--sidebar-w);flex-shrink:0;display:flex;flex-direction:column;background:var(--bg1);border-right:1px solid var(--border);transition:transform 0.25s ease;}
.main-area{flex:1;display:flex;overflow:hidden;}
.chat-col{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:0;}
.tools-panel{width:var(--tools-w);flex-shrink:0;display:flex;flex-direction:column;background:var(--bg1);overflow:hidden;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;}
.mob-nav{display:none;}
.mob-header-btn{display:none;}

/* ── MOBILE layout (≤768px) ── */
@media(max-width:768px){
  :root{--sidebar-w:88vw;--tools-w:100vw;}

  /* Sidebar: off-canvas drawer */
  .sidebar{
    position:fixed;top:0;left:0;height:100%;
    width:var(--sidebar-w);max-width:320px;
    z-index:300;overflow-y:auto;
    transform:translateX(-110%);
    transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
    box-shadow:4px 0 40px rgba(0,0,0,0.7);
    display:flex;flex-direction:column;
    will-change:transform;overscroll-behavior:contain;
  }
  .sidebar.open{transform:translateX(0);}

  /* Overlay: visible on mobile only */
  .overlay.open{display:block;}
  .mob-header-btn{display:flex;}

  /* Main area: full width since sidebar is off-canvas */
  .main-area{width:100vw;}

  /* Chat column: full width, no right border */
  .chat-col{width:100%;border-right:none;min-width:0;}

  /* Tools panel: bottom sheet */
  .tools-panel{
    position:fixed;bottom:0;left:0;right:0;z-index:250;
    height:75vh;max-height:600px;
    border-radius:20px 20px 0 0;
    border-top:1px solid var(--border-hi);
    transform:translateY(110%);
    transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
    background:var(--bg1);overflow:hidden;
    display:flex;flex-direction:column;
    will-change:transform;overscroll-behavior:contain;
  }
  .tools-panel.open{transform:translateY(0);}

  /* Bottom nav bar */
  .mob-nav{
    display:flex;height:56px;flex-shrink:0;
    background:var(--bg1);border-top:1px solid var(--border);
    align-items:stretch;z-index:100;
    padding-bottom:env(safe-area-inset-bottom,0px);
  }
  .mob-nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:3px;font-size:10px;
    color:var(--text-3);cursor:pointer;border:none;background:none;
    padding:8px 4px;transition:color 0.15s;
    -webkit-tap-highlight-color:transparent;
    position:relative;
  }
  .mob-nav-btn.active{color:var(--teal);}
  .mob-nav-btn svg{opacity:0.7;}
  .mob-nav-btn.active svg{opacity:1;}

  /* Chat */
  .chat-messages{padding:12px 10px;}
  .msg-bubble{max-width:90%;word-break:break-word;overflow-wrap:break-word;}

  /* Input area */
  .chat-input-area{
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));
  }

  /* Status bar: hidden */
  .status-bar{display:none !important;}

  /* Header user pill: hidden */
  .header-user-pill{display:none !important;}

  /* Header */
  .app-header{padding:0 10px;}

  /* Keyboard-aware layout: driven directly from Visual Viewport API */
  /* --vv-height = visualViewport.height (excludes keyboard) */
  /* --vv-top    = visualViewport.offsetTop (iOS scroll offset when keyboard opens) */
  .app-shell{
    height:var(--vv-height,100dvh);
    transform:translateY(var(--vv-top,0px));
    transition:height 0.05s linear,transform 0.05s linear;
  }

  /* Bigger tap targets on nav buttons */
  .mob-nav{height:60px;}
  .mob-nav-btn{padding:6px 2px;min-width:48px;}
}

/* Desktop: never show overlay */
@media(min-width:769px){
  .overlay{display:none !important;}
}

/* Safe area */
@supports(padding:env(safe-area-inset-bottom)){
  .mob-nav{padding-bottom:env(safe-area-inset-bottom);}
  .chat-input-area{padding-bottom:calc(8px + env(safe-area-inset-bottom));}
  .sidebar .sidebar-header-inner{padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right));}
}

/* Tablet */
@media(min-width:769px) and (max-width:1024px){
  :root{--sidebar-w:220px;--tools-w:210px;}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ─── API ──────────────────────────────────────────────────────────────────────
const API=window.location.origin;
function _getToken(){try{const s=localStorage.getItem('donna-user');return s?JSON.parse(s).token:null;}catch{return null;}}
async function authFetch(path,opts={}){
  const token=_getToken();
  if(token){opts.headers={...(opts.headers||{}),Authorization:'Bearer '+token};}
  const res=await fetch(API+path,opts);
  if(res.status===401){localStorage.removeItem('donna-user');window.location.reload();return;}
  if(!res.ok)throw new Error(`HTTP ${res.status}: ${await res.text().catch(()=>'')}`);
  return res.json();
}
const fetchApi=authFetch;

// ─── STATIC DATA ──────────────────────────────────────────────────────────────
const TEAM_STATIC=[
  {id:'talha',  name:'Talha',      role:'Project Lead',   status:'online',avatar:'T',whatsapp:'+966546065347'},
  {id:'albaraa',name:'Al Baraa',   role:'Implementation', status:'away',  avatar:'A',whatsapp:'+966544272725'},
];

const TOOLS=[
  {section:'Financial',managerOnly:true,items:[
    {id:'overdue_invoices',    label:'Overdue Invoices'},
    {id:'collections_tracker', label:'Collections Tracker'},
    {id:'payables_summary',    label:'Payables Summary'},
    {id:'daily_financial',     label:'Daily Financial'},
    {id:'pl_overview',         label:'P&L Overview'},
    {id:'payment_patterns',    label:'Payment Patterns'},
    {id:'proforma_conversions',label:'Proforma Conversions'},
  ]},
  {section:'Operations',items:[
    {id:'open_tickets',   label:'Open Tickets'},
    {id:'overdue_tickets',label:'Overdue Tickets'},
    {id:'create_ticket',  label:'Create Ticket'},
    {id:'zatca_status',   label:'ZATCA Status'},
  ]},
  {section:'Communication',items:[
    {id:'send_whatsapp',label:'Send WhatsApp'},
    {id:'send_email',   label:'Send Email'},
    {id:'my_email',     label:'My Email Inbox'},
    {id:'calendar',     label:'Calendar'},
  ]},
  {section:'System',adminOnly:true,items:[
    {id:'donna_suggestions',label:'Suggestions Log'},
    {id:'session_log',      label:'Session Log'},
    {id:'wa_settings',      label:'WhatsApp Settings'},
    {id:'user_mgmt',        label:'User Management'},
    {id:'role_perms',       label:'Role Permissions'},
  ]},
];

// ─── UI PRIMITIVES ────────────────────────────────────────────────────────────
const Badge=({color,children})=>{
  const c={
    green:{bg:'var(--green-dim)',text:'var(--green)'},
    red:  {bg:'var(--red-dim)',  text:'var(--red)'},
    amber:{bg:'var(--amber-dim)',text:'var(--amber)'},
    teal: {bg:'var(--teal-dim)', text:'var(--teal)'},
  }[color]||{bg:'var(--teal-dim)',text:'var(--teal)'};
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,background:c.bg,color:c.text,borderRadius:4,padding:'2px 8px',fontSize:11,fontWeight:600,fontFamily:'var(--mono)'}}>
    <span style={{width:5,height:5,borderRadius:'50%',background:c.text,flexShrink:0}}/>{children}
  </span>;
};

const MiniTable=({headers,rows})=>(
  <div style={{overflowX:'auto',marginTop:8,WebkitOverflowScrolling:'touch'}}>
    <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,fontFamily:'var(--mono)',minWidth:400}}>
      <thead><tr>{headers.map(h=><th key={h} style={{textAlign:'left',padding:'6px 10px',color:'var(--text-3)',borderBottom:'1px solid var(--border)',fontWeight:500,fontSize:11,whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
      <tbody>{rows.map((row,i)=><tr key={i} style={{borderBottom:'1px solid var(--border)'}}>{row.map((cell,j)=><td key={j} style={{padding:'7px 10px',color:'var(--text-1)',whiteSpace:'nowrap',verticalAlign:'middle'}}>{cell}</td>)}</tr>)}</tbody>
    </table>
  </div>
);

const MetricRow=({metrics})=>(
  <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
    {metrics.map(m=>(
      <div key={m.label} style={{background:'var(--bg0)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',flex:'1 1 80px',minWidth:80}}>
        <div style={{fontSize:10,color:'var(--text-3)',marginBottom:4,textTransform:'uppercase',letterSpacing:'0.06em'}}>{m.label}</div>
        <div style={{fontSize:18,fontWeight:600,color:m.color||'var(--text-1)',fontFamily:'var(--mono)'}}>{m.value}</div>
        {m.sub&&<div style={{fontSize:10,color:'var(--text-3)',marginTop:2}}>{m.sub}</div>}
      </div>
    ))}
  </div>
);

const fmt=n=>'SAR '+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
function Divider(){return <span style={{margin:'0 8px',color:'var(--border-hi)'}}>·</span>;}

// ─── TOOL COMPONENTS ──────────────────────────────────────────────────────────
function ApiOverdueInvoices({data}){
  if(!data?.invoices?.length) return <div style={{marginTop:8,color:'var(--green)',fontSize:13}}>No overdue invoices.</div>;
  const rows=data.invoices.map(x=>[x.customer||x.party||'—',x.name,fmt(x.outstanding_amount||0),String(x.due_date||'').slice(0,10),`${x.days_late||0}d`,<Badge color={x.days_late>30?'red':x.days_late>7?'amber':'teal'}>{x.days_late>30?'Critical':x.days_late>7?'Overdue':'Grace'}</Badge>]);
  return <MiniTable headers={['Client','Invoice','Amount','Due','OD','Status']} rows={rows}/>;
}
function ApiCollections({data}){
  if(!data?.escalations?.length) return <div style={{marginTop:8,color:'var(--text-3)',fontSize:13}}>No active collections escalations.</div>;
  const rows=data.escalations.map(x=>[x.customer||'—',x.invoice_name||'—',fmt(x.amount||0),`${x.days_overdue||0}d`,<Badge color={x.times_flagged>=14?'red':'amber'}>{x.times_flagged>=14?'Escalated':'Warning'}</Badge>]);
  return <MiniTable headers={['Client','Invoice','Amount','Overdue','Status']} rows={rows}/>;
}
function ApiPayables({data}){
  if(!data?.payables?.length) return <div style={{marginTop:8,color:'var(--green)',fontSize:13}}>No overdue payables.</div>;
  const rows=data.payables.map(x=>[x.supplier||x.party||'—',fmt(x.outstanding_amount||0),String(x.due_date||'').slice(0,10),<Badge color={x.days_late>0?'red':'green'}>{x.days_late>0?`${x.days_late}d OD`:'OK'}</Badge>]);
  return <><div style={{marginTop:8,padding:'6px 10px',background:'var(--red-dim)',borderRadius:6,fontSize:12,color:'var(--red)'}}>Total owed: {fmt(data.total_owed||0)}</div><MiniTable headers={['Vendor','Amount','Due','Status']} rows={rows}/></>;
}
function ApiDailyFinancial({data}){
  if(!data) return null;
  return <MetricRow metrics={[
    {label:'Invoices 7d',value:String(data.invoices_this_week||0)},
    {label:'Payments 7d',value:String(data.payments_this_week||0),color:'var(--green)'},
    {label:'Overdue',value:fmt(data.overdue_total||0),color:'var(--red)'},
    {label:'Proformas',value:String(data.proforma_count||0),color:'var(--amber)'},
  ]}/>;
}
function ApiPL({data}){
  if(!data) return null;
  const margin=data.revenue>0?((data.net/data.revenue)*100).toFixed(1):'0.0';
  return <MetricRow metrics={[
    {label:'Revenue 30d',value:fmt(data.revenue||0),color:'var(--teal)'},
    {label:'Expenses',value:fmt(data.expenses||0)},
    {label:'Net',value:fmt(data.net||0),color:(data.net||0)>=0?'var(--green)':'var(--red)',sub:`${margin}% margin`},
  ]}/>;
}
function ApiPaymentPatterns({data}){
  if(!data?.patterns?.length) return <div style={{marginTop:8,color:'var(--text-3)',fontSize:13}}>Not enough data.</div>;
  const rows=data.patterns.slice(0,10).map(x=>[x.customer,`${x.avg_days_to_pay}d`,<Badge color={x.status==='late'?'amber':'green'}>{x.status==='late'?'Slow':'Good'}</Badge>,x.payments_count+' pmts']);
  return <MiniTable headers={['Client','Avg Days','Reliability','Count']} rows={rows}/>;
}
function ApiProformas({data}){
  if(!data?.proformas?.length) return <div style={{marginTop:8,color:'var(--green)',fontSize:13}}>No unconverted proformas.</div>;
  const rows=data.proformas.map(x=>[x.name,x.customer||'—',fmt(x.grand_total||0),<Badge color={x.per_billed>50?'teal':'amber'}>{x.status||'Pending'}</Badge>]);
  return <><div style={{marginTop:8,padding:'6px 10px',background:'var(--amber-dim)',borderRadius:6,fontSize:12,color:'var(--amber)'}}>Pipeline: {fmt(data.total_value||0)}</div><MiniTable headers={['Proforma','Client','Value','Status']} rows={rows}/></>;
}
function ApiOpenTickets({data}){
  if(!data?.tickets?.length) return <div style={{marginTop:8,color:'var(--green)',fontSize:13}}>No open tickets.</div>;
  const rows=data.tickets.slice(0,10).map(x=>[x.name,(x.subject||'').slice(0,35),x.priority||'Med',<Badge color={x.priority==='Urgent'||x.priority==='High'?'red':'amber'}>{x.priority||'Med'}</Badge>]);
  return <MiniTable headers={['#','Subject','Priority','Badge']} rows={rows}/>;
}
function ApiOverdueTickets({data}){
  if(!data?.tickets?.length) return <div style={{marginTop:8,color:'var(--green)',fontSize:13}}>No SLA breaches.</div>;
  const rows=data.tickets.slice(0,10).map(x=>[x.name,(x.subject||'').slice(0,30),`${Math.round(x.age_hours||0)}h`,`${x.sla_hours||0}h SLA`,<Badge color='red'>Breached</Badge>]);
  return <MiniTable headers={['#','Subject','Age','SLA','Status']} rows={rows}/>;
}
function ApiZatca({data}){
  if(!data?.issues?.length) return <div style={{marginTop:8,padding:'10px 14px',background:'var(--green-dim)',border:'1px solid rgba(16,212,116,0.2)',borderRadius:8,fontSize:13,color:'var(--green)'}}>ZATCA: all clear.</div>;
  const rows=data.issues.map(x=>[x.invoice_reference||x.name,x.status||'—',x.zatca_status||'—',String(x.creation||'').slice(0,10)]);
  return <><div style={{marginTop:8,padding:'6px 10px',background:'var(--red-dim)',borderRadius:6,fontSize:12,color:'var(--red)'}}>{data.count} issue(s)</div><MiniTable headers={['Invoice','Status','ZATCA','Date']} rows={rows}/></>;
}
function ApiSuggestions({data}){
  if(!data?.suggestions?.length) return <div style={{marginTop:8,color:'var(--text-3)',fontSize:13}}>No suggestions.</div>;
  return <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:8}}>
    {data.suggestions.map((s,i)=>(
      <div key={i} style={{padding:'9px 12px',background:'var(--bg0)',borderLeft:`3px solid var(--${s.priority==='high'?'red':s.priority==='medium'?'amber':'teal'})`,borderRadius:'0 7px 7px 0',fontSize:12}}>
        <div style={{color:'var(--text-3)',fontSize:10,marginBottom:3}}>{s.date_noticed||''} · {s.priority||''}</div>
        <div style={{color:'var(--text-1)',lineHeight:1.5}}>{s.description}</div>
      </div>
    ))}
  </div>;
}
function ApiSessionLog({data}){
  if(!data?.content) return <div style={{marginTop:8,color:'var(--text-3)',fontSize:13}}>No session log.</div>;
  return <div style={{marginTop:8,background:'var(--bg0)',border:'1px solid var(--border)',borderRadius:8,padding:'12px',maxHeight:300,overflowY:'auto',fontSize:11,lineHeight:1.7,fontFamily:'var(--mono)',color:'var(--text-2)',whiteSpace:'pre-wrap'}}>{data.content.split('\n').slice(-60).join('\n')}</div>;
}

let _teamContacts=[];
function ApiSendWhatsApp(){
  const [to,setTo]=useState('');const [msg,setMsg]=useState('');const [status,setStatus]=useState(null);const [loading,setLoading]=useState(false);
  const send=async()=>{if(!to||!msg)return;setLoading(true);try{await fetchApi('/api/tools/send-whatsapp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to,message:msg})});setStatus({ok:true,msg:'Sent!'});}catch(e){setStatus({ok:false,msg:e.message});}setLoading(false);};
  if(status) return <div style={{marginTop:8,color:status.ok?'var(--green)':'var(--red)',fontSize:13}}>{status.ok?'✓ ':''}{status.msg}<button onClick={()=>setStatus(null)} style={{marginLeft:8,background:'none',border:'none',cursor:'pointer',color:'var(--text-3)',fontSize:11}}>Send another</button></div>;
  const inp={background:'var(--bg0)',border:'1px solid var(--border)',borderRadius:6,padding:'9px 12px',color:'var(--text-1)',fontSize:13,outline:'none',width:'100%'};
  const contacts=_teamContacts.filter(m=>m.whatsapp);
  return <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:8}}>
    {contacts.length>0&&<select value={to} onChange={e=>setTo(e.target.value)} style={{...inp,color:to?'var(--text-1)':'var(--text-3)'}}>
      <option value="">— Pick team contact —</option>
      {contacts.map(m=><option key={m.id} value={m.whatsapp}>{m.name} ({m.whatsapp})</option>)}
    </select>}
    <input value={to} onChange={e=>setTo(e.target.value)} placeholder="+966XXXXXXXXX (or pick above)" style={inp}/>
    <textarea value={msg} onChange={e=>setMsg(e.target.value)} rows={3} placeholder="Message..." style={{...inp,resize:'none'}}/>
    <button onClick={send} disabled={loading||!to||!msg} style={{background:'#25d366',color:'#fff',borderRadius:6,padding:'9px 16px',fontSize:13,fontWeight:600,opacity:(loading||!to||!msg)?0.55:1,alignSelf:'flex-start'}}>{loading?'Sending…':'Send WhatsApp'}</button>
  </div>;
}
function ApiSendEmail(){
  const [to,setTo]=useState('');const [subj,setSubj]=useState('');const [body,setBody]=useState('');const [status,setStatus]=useState(null);const [loading,setLoading]=useState(false);
  const send=async()=>{if(!to||!subj)return;setLoading(true);try{await fetchApi('/api/tools/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to,subject:subj,message:body})});setStatus({ok:true});}catch(e){setStatus({ok:false,msg:e.message});}setLoading(false);};
  if(status) return <div style={{marginTop:8,color:status.ok?'var(--green)':'var(--red)',fontSize:13}}>{status.ok?'✓ Email sent.':status.msg}</div>;

function inlineMarkdown(text,ki){
  const parts=text.split(/(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/g);
  return parts.map((p,i)=>{
    if(p.startsWith('**')&&p.endsWith('**')) return <strong key={ki+'b'+i}>{p.slice(2,-2)}</strong>;
    if(p.startsWith('*')&&p.endsWith('*')) return <em key={ki+'i'+i}>{p.slice(1,-1)}</em>;
    if(p.startsWith('`')&&p.endsWith('`')) return <code key={ki+'c'+i} style={{background:'var(--bg3)',borderRadius:3,padding:'1px 5px',fontSize:'0.9em',fontFamily:'var(--mono)'}}>{p.slice(1,-1)}</code>;
    return p;
  });
}
function parseMarkdown(text){
  if(!text) return null;
  const lines=text.split('\n');
  return lines.map((line,li)=>{
    const hm=line.match(/^(#{1,3})\s+(.+)/);
    if(hm){const sz=[18,15,13][hm[1].length-1]||13;return <div key={li} style={{fontWeight:700,fontSize:sz,marginTop:8,marginBottom:2,color:'var(--text-1)'}}>{inlineMarkdown(hm[2],li)}</div>;}
    if(/^[-+]\s/.test(line)){return <div key={li} style={{display:'flex',gap:6,marginTop:2}}><span style={{color:'var(--teal)',flexShrink:0}}>•</span><span>{inlineMarkdown(line.slice(2),li)}</span></div>;}
    const nm=line.match(/^(\d+)\.\s+(.+)/);
    if(nm){return <div key={li} style={{display:'flex',gap:6,marginTop:2}}><span style={{color:'var(--teal)',flexShrink:0,minWidth:16}}>{nm[1]}.</span><span>{inlineMarkdown(nm[2],li)}</span></div>;}
    if(!line.trim()) return <div key={li} style={{height:6}}/>;
    return <div key={li}>{inlineMarkdown(line,li)}</div>;
  });
}

    authFetch('/api/conversations/claims').then(d=>{

        const c=d.claims.find(x=>x.phone_number===phone);
        setClaim(c||null);
      }
    });
  };
  React.useEffect(()=>{refresh();const t=setInterval(refresh,10000);return()=>clearInterval(t);},[phone]);

  const doClaim=async()=>{
    setLoading(true);
    const r=await authFetch(`/api/customers/${encodeURIComponent(phone)}/claim`,{method:'POST'});
    setLoading(false);
    if(r&&r.ok) refresh();

  const doRelease=async()=>{
    setLoading(true);
    await authFetch(`/api/customers/${encodeURIComponent(phone)}/release`,{method:'POST'});
    setLoading(false);
    refresh();
  };

  const me=loggedIn?.username;

    </span>;
  }

  return <button onClick={doClaim} disabled={loading}
    style={{background:'var(--teal-dim)',color:'var(--teal)',border:'1px solid var(--teal)',borderRadius:4,padding:'1px 8px',fontSize:10,fontWeight:600,cursor:'pointer'}}>

function OutboundWAComposer({onClose,onSent}){
  const [phone,setPhone]=React.useState('');
  const [message,setMessage]=React.useState('');
  const [windowOpen,setWindowOpen]=React.useState(null);
  const [checking,setChecking]=React.useState(false);
  const [sending,setSending]=React.useState(false);
  const [error,setError]=React.useState('');
  const [templates,setTemplates]=React.useState(null);
  const [selectedTemplate,setSelectedTemplate]=React.useState(null);
  const [templateParams,setTemplateParams]=React.useState([]);

  React.useEffect(()=>{
    authFetch('/api/whatsapp/templates').then(d=>{if(d)setTemplates(d.templates||[]);});
  },[]);

  const checkWindow=async(num)=>{
    if(!num||num.length<7) return;
    setChecking(true);
    const d=await authFetch(`/api/whatsapp/check-window/${encodeURIComponent(num)}`);
    setChecking(false);
    if(d) setWindowOpen(d.window_open);
  };

  const send=async()=>{
    const usingTemplate=windowOpen===false&&selectedTemplate;
    if(!phone.trim()){setError('Phone number required');return;}
    if(!usingTemplate&&!message.trim()){setError('Message required (or select a template for closed windows)');return;}
    if(windowOpen===false&&!usingTemplate){setError('Window closed — you must select a template');return;}
    setSending(true);setError('');
    const payload={phone_number:phone.trim()};
    if(usingTemplate){
      payload.template_name=selectedTemplate;
      payload.template_params=templateParams;
    } else {
      payload.message=message.trim();
    }
    const d=await authFetch('/api/whatsapp/send',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    setSending(false);
    if(d&&d.ok){onSent&&onSent(phone.trim());onClose();}
    else setError(d?.detail||'Send failed');
  };

  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div style={{background:'var(--bg1)',borderRadius:12,padding:24,width:420,maxWidth:'90vw',display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:14,fontWeight:600,color:'var(--text-1)'}}>New WhatsApp Message</div>
        <button onClick={onClose} style={{background:'none',border:'none',color:'var(--text-3)',cursor:'pointer',fontSize:18}}>✕</button>
      </div>
      <div>
        <div style={{fontSize:11,color:'var(--text-3)',marginBottom:4}}>Phone number (with country code)</div>
        <input value={phone} onChange={e=>{setPhone(e.target.value);setWindowOpen(null);}}
          onBlur={()=>checkWindow(phone)}
          placeholder="+966500000000"
          style={{width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,
            padding:'7px 10px',color:'var(--text-1)',fontSize:13,outline:'none',boxSizing:'border-box'}}/>
        {windowOpen!==null&&<div style={{marginTop:4}}>
          {checking
            ? <span style={{fontSize:10,color:'var(--text-3)'}}>Checking…</span>
            : windowOpen
              ? <span style={{fontSize:10,color:'var(--teal)'}}>&#10003; 24h window open — free text allowed</span>
              : <div style={{background:'var(--amber-dim)',border:'1px solid rgba(245,166,35,0.3)',borderRadius:6,padding:'8px 10px',fontSize:11}}>
                  <div style={{color:'var(--amber)',fontWeight:600,marginBottom:4}}>&#9888; 24h window closed &#8212; template required</div>
                  {templates===null
                    ? <div style={{color:'var(--text-3)'}}>Loading templates&#8230;</div>
                    : templates.length===0
                      ? <div style={{color:'var(--text-2)'}}>No approved templates. Approve in Meta Business Manager first.</div>
                      : <div>
                          <div style={{color:'var(--text-2)',marginBottom:6}}>Choose a template:</div>
                          <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:150,overflowY:'auto'}}>
                            {templates.map(t=><button key={t.template_name} onClick={()=>{setSelectedTemplate(t.template_name);setTemplateParams([]);}} style={{textAlign:'left',padding:'5px 8px',borderRadius:5,border:'1px solid',borderColor:selectedTemplate===t.template_name?'var(--teal)':'var(--border)',background:selectedTemplate===t.template_name?'var(--teal-dim)':'var(--bg2)',color:'var(--text-1)',cursor:'pointer',fontSize:11,marginBottom:2}}><strong>{t.template_name}</strong><span style={{color:'var(--text-3)',marginLeft:6,fontSize:9}}>{t.language}</span></button>)}
                          </div>
                          {selectedTemplate&&<div style={{marginTop:6}}>
                            <div style={{fontSize:10,color:'var(--teal)',marginBottom:4}}>Selected: {selectedTemplate}</div>
                            {(()=>{
                              const tmpl=templates.find(t=>t.template_name===selectedTemplate);
                              const count=tmpl?.param_count||0;
                              if(!count) return null;
                              return <div style={{marginTop:4}}>
                                <div style={{fontSize:9,color:'var(--text-3)',marginBottom:4}}>Fill in template placeholders:</div>
                                {Array.from({length:count},(_,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                                  <span style={{fontSize:9,color:'var(--text-3)',flexShrink:0,width:20}}>{'{{'}{i+1}{'}}'}</span>
                                  <input value={templateParams[i]||''} onChange={e=>{const p=[...templateParams];p[i]=e.target.value;setTemplateParams(p);}}
                                    placeholder={`Parameter ${i+1}`}
                                    style={{flex:1,background:'var(--bg1)',border:'1px solid var(--border)',borderRadius:4,
                                      padding:'3px 7px',color:'var(--text-1)',fontSize:11,outline:'none'}}/>
                                </div>)}
                                {tmpl?.body_text&&<div style={{marginTop:4,fontSize:9,color:'var(--text-3)',fontStyle:'italic',lineHeight:1.5}}>
                                  Preview: {tmpl.body_text.slice(0,120)}
                                </div>}
                              </div>;
                            })()}
                          </div>}
                        </div>
                  }
                </div>
          }
        </div>}
      </div>
      <div>
        <div style={{fontSize:11,color:'var(--text-3)',marginBottom:4}}>Message</div>
        <textarea value={message} onChange={e=>setMessage(e.target.value)} rows={4} placeholder="Type your message…"
          style={{width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,
            padding:'7px 10px',color:'var(--text-1)',fontSize:13,outline:'none',resize:'vertical',boxSizing:'border-box'}}/>
        <div style={{fontSize:9,color:'var(--text-3)',marginTop:2}}>{message.length} / 1024 chars</div>
      </div>
      {error&&<div style={{color:'var(--red)',fontSize:11}}>{error}</div>}
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button onClick={onClose} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,padding:'6px 16px',fontSize:12,color:'var(--text-2)',cursor:'pointer'}}>Cancel</button>
        <button onClick={send} disabled={sending||!message.trim()||!phone.trim()}
          style={{background:'var(--teal)',color:'#000',border:'none',borderRadius:6,padding:'6px 16px',fontSize:12,fontWeight:600,cursor:'pointer',opacity:(sending||!message.trim()||!phone.trim())?0.5:1}}>
          {sending?'Sending…':windowOpen===false&&selectedTemplate?`Send template: ${selectedTemplate}`:'Send via WhatsApp'}
        </button>
      </div>
    </div>
  </div>;
}

function GmailConnectModal({onClose,onConnected}){
  const [step,setStep]=React.useState('idle'); // idle|loading|waiting|done|error
  const [info,setInfo]=React.useState(null);
  const [error,setError]=React.useState('');
  const [polling,setPolling]=React.useState(false);

  const start=async()=>{
    setStep('loading');setError('');
    const d=await authFetch('/api/oauth/google/start').catch(()=>null);
    if(!d||d.detail){setError(d?.detail||'Failed to start OAuth');setStep('error');return;}
    setInfo(d);setStep('waiting');
    // Start polling
    setPolling(true);
  };

  React.useEffect(()=>{
    if(!polling||!info) return;
    let stopped=false;
    const poll=async()=>{
      while(!stopped){
        await new Promise(r=>setTimeout(r,(info.interval||5)*1000));
        const d=await authFetch('/api/oauth/google/poll',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({device_code:info.device_code})
        }).catch(()=>null);
        if(!d) continue;
        if(d.status==='connected'){setStep('done');onConnected&&onConnected(d.email);stopped=true;return;}
        if(d.status==='error'){setError(d.detail||'Auth error');setStep('error');stopped=true;return;}
      }
    };
    poll();
    return ()=>{stopped=true;};
  },[polling,info]);

  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:600,display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div style={{background:'var(--bg1)',borderRadius:12,padding:24,width:400,maxWidth:'90vw',display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:14,fontWeight:600,color:'var(--text-1)'}}>Connect Gmail</div>
        <button onClick={onClose} style={{background:'none',border:'none',color:'var(--text-3)',cursor:'pointer',fontSize:18}}>&#x2715;</button>
      </div>
      {step==='idle'&&<div>
        <div style={{fontSize:12,color:'var(--text-2)',lineHeight:1.6,marginBottom:12}}>
          Connect your Gmail account to receive email summaries and draft replies directly in Donna.
        </div>
        <button onClick={start} style={{width:'100%',background:'var(--teal)',color:'#000',border:'none',borderRadius:8,padding:'10px',fontSize:13,fontWeight:600,cursor:'pointer'}}>
          Connect Gmail Account
        </button>
      </div>}
      {step==='loading'&&<div style={{textAlign:'center',color:'var(--text-3)',fontSize:13}}>Starting authentication&#8230;</div>}
      {step==='waiting'&&info&&<div>
        <div style={{fontSize:12,color:'var(--text-2)',marginBottom:10,lineHeight:1.6}}>
          Open this URL on your phone and enter the code below:
        </div>
        <div style={{background:'var(--bg2)',borderRadius:8,padding:12,textAlign:'center',marginBottom:10}}>
          <div style={{fontSize:11,color:'var(--text-3)',marginBottom:4}}>URL</div>
          <div style={{fontSize:13,color:'var(--teal)',wordBreak:'break-all'}}>{info.verification_url}</div>
        </div>
        <div style={{background:'var(--bg2)',borderRadius:8,padding:12,textAlign:'center',marginBottom:10}}>
          <div style={{fontSize:11,color:'var(--text-3)',marginBottom:4}}>Enter this code</div>
          <div style={{fontSize:24,fontWeight:700,letterSpacing:'0.15em',color:'var(--text-1)',fontFamily:'monospace'}}>{info.user_code}</div>
        </div>
        <div style={{fontSize:11,color:'var(--text-3)',textAlign:'center'}}>Waiting for authorisation&#8230;</div>
      </div>}
      {step==='done'&&<div style={{textAlign:'center'}}>
        <div style={{fontSize:28,marginBottom:8}}>&#10003;</div>
        <div style={{fontSize:14,fontWeight:600,color:'var(--teal)',marginBottom:4}}>Gmail Connected!</div>
        <button onClick={onClose} style={{marginTop:8,background:'var(--teal)',color:'#000',border:'none',borderRadius:8,padding:'8px 20px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Done</button>
      </div>}
      {step==='error'&&<div>
        <div style={{color:'var(--red)',fontSize:12,marginBottom:8}}>{error}</div>
        <button onClick={()=>setStep('idle')} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 14px',fontSize:12,color:'var(--text-2)',cursor:'pointer'}}>Try again</button>
      </div>}
    </div>
  </div>;
}


function CalendarPanel({onClose}){
  const [events,setEvents]=React.useState(null);
  const [showCreate,setShowCreate]=React.useState(false);
  const [creating,setCreating]=React.useState(false);
  const [error,setError]=React.useState('');
  const [form,setForm]=React.useState({
    title:'',start:'',end:'',description:'',attendees:'',location:'',with_meet:false
  });

  const load=()=>{
    setEvents(null);
    authFetch('/api/calendar/events?days=14').then(d=>{
      if(d) setEvents(d.events||[]);
    });
  };
  React.useEffect(load,[]);

  const create=async()=>{
    if(!form.title||!form.start||!form.end){setError('Title, start and end required');return;}
    setCreating(true);setError('');
    const attendees=form.attendees.split(',').map(s=>s.trim()).filter(Boolean);
    const d=await authFetch('/api/calendar/events',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({...form,attendees})
    }).catch(()=>null);
    setCreating(false);
    if(d&&d.ok){setShowCreate(false);setForm({title:'',start:'',end:'',description:'',attendees:'',location:'',with_meet:false});load();}
    else setError(d?.detail||'Create failed');
  };

  const del=async(eventId)=>{
    await authFetch(`/api/calendar/events/${encodeURIComponent(eventId)}`,{method:'DELETE'}).catch(()=>null);
    load();
  };

  const fmt=(iso)=>{
    if(!iso) return '';
    try{
      const d=new Date(iso);
      return d.toLocaleString('en-SA',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true});
    }catch{return iso;}
  };

  const panelStyle={position:'fixed',top:0,right:0,bottom:0,width:480,maxWidth:'100vw',
    background:'var(--bg1)',borderLeft:'1px solid var(--border)',zIndex:400,
    display:'flex',flexDirection:'column',overflow:'hidden'};

  const inputStyle={width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,
    padding:'6px 9px',color:'var(--text-1)',fontSize:12,outline:'none',boxSizing:'border-box'};

  return <div style={panelStyle}>
    <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
      <div style={{fontSize:14,fontWeight:600,color:'var(--text-1)'}}>Calendar</div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <button onClick={()=>setShowCreate(c=>!c)} style={{background:'var(--teal)',color:'#000',border:'none',borderRadius:6,padding:'5px 12px',fontSize:11,fontWeight:600,cursor:'pointer'}}>
          + New Event
        </button>
        <button onClick={onClose} style={{background:'none',border:'none',color:'var(--text-3)',cursor:'pointer',fontSize:18,padding:4}}>&#x2715;</button>
      </div>
    </div>

    {showCreate&&<div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',background:'var(--bg0)',flexShrink:0}}>
      <div style={{fontSize:12,fontWeight:600,color:'var(--text-1)',marginBottom:10}}>New Event</div>
      <div style={{display:'flex',flexDirection:'column',gap:7}}>
        <input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Event title" style={inputStyle}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
          <div>
            <div style={{fontSize:10,color:'var(--text-3)',marginBottom:2}}>Start</div>
            <input type="datetime-local" value={form.start} onChange={e=>setForm({...form,start:e.target.value})} style={inputStyle}/>
          </div>
          <div>
            <div style={{fontSize:10,color:'var(--text-3)',marginBottom:2}}>End</div>
            <input type="datetime-local" value={form.end} onChange={e=>setForm({...form,end:e.target.value})} style={inputStyle}/>
          </div>
        </div>
        <input value={form.location} onChange={e=>setForm({...form,location:e.target.value})} placeholder="Location (optional)" style={inputStyle}/>
        <input value={form.attendees} onChange={e=>setForm({...form,attendees:e.target.value})} placeholder="Attendees: email1@x.com, email2@x.com" style={inputStyle}/>
        <textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Description (optional)" rows={2}
          style={{...inputStyle,resize:'none',lineHeight:1.5}}/>
        <label style={{display:'flex',alignItems:'center',gap:8,fontSize:11,color:'var(--text-2)',cursor:'pointer'}}>
          <input type="checkbox" checked={form.with_meet} onChange={e=>setForm({...form,with_meet:e.target.checked})}/>
          Add Google Meet link
        </label>
        {error&&<div style={{color:'var(--red)',fontSize:11}}>{error}</div>}
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button onClick={()=>setShowCreate(false)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,padding:'5px 14px',fontSize:11,color:'var(--text-2)',cursor:'pointer'}}>Cancel</button>
          <button onClick={create} disabled={creating} style={{background:'var(--teal)',color:'#000',border:'none',borderRadius:6,padding:'5px 16px',fontSize:11,fontWeight:600,cursor:'pointer',opacity:creating?0.5:1}}>
            {creating?'Creating…':'Create Event'}
          </button>
        </div>
      </div>
    </div>}

    <div style={{overflowY:'auto',flex:1}}>
      {events===null
        ? <div style={{padding:40,textAlign:'center',color:'var(--text-3)',fontSize:13}}>Loading&#8230;</div>
        : events.length===0
          ? <div style={{padding:40,textAlign:'center',color:'var(--text-3)',fontSize:13}}>No events in the next 14 days</div>
          : events.map(ev=>{
              const hasDate=ev.start&&ev.start.includes('T');
              return <div key={ev.event_id} style={{padding:'12px 20px',borderBottom:'1px solid var(--border)',display:'flex',gap:12,alignItems:'flex-start'}}>
                <div style={{width:38,height:38,borderRadius:8,background:'var(--teal-dim)',border:'1px solid var(--teal)',
                  display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <div style={{fontSize:9,color:'var(--teal)',fontWeight:700,textTransform:'uppercase',lineHeight:1}}>
                    {ev.start?new Date(ev.start).toLocaleString('en',{month:'short'}):''}
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--teal)',lineHeight:1.2}}>
                    {ev.start?new Date(ev.start).getDate():'?'}
                  </div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--text-1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.title}</div>
                  <div style={{fontSize:10,color:'var(--text-3)',marginTop:2}}>{fmt(ev.start)}{ev.end?' – '+fmt(ev.end):''}</div>
                  {ev.location&&<div style={{fontSize:10,color:'var(--text-2)',marginTop:1}}>&#128205; {ev.location}</div>}
                  {ev.attendees&&ev.attendees.length>0&&<div style={{fontSize:10,color:'var(--text-3)',marginTop:1}}>&#128100; {ev.attendees.join(', ')}</div>}
                  {ev.meet_link&&<a href={ev.meet_link} target="_blank" rel="noreferrer" style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:10,color:'var(--teal)',marginTop:3,textDecoration:'none'}}>
                    &#128249; Join Meet
                  </a>}
                </div>
                <button onClick={()=>del(ev.event_id)} title="Delete event"
                  style={{background:'none',border:'none',color:'var(--text-3)',cursor:'pointer',fontSize:14,padding:2,flexShrink:0,opacity:0.5}}>&#x2715;</button>
              </div>;
            })
      }
    </div>
    <div style={{padding:'10px 20px',borderTop:'1px solid var(--border)',flexShrink:0}}>
      <button onClick={load} style={{fontSize:11,color:'var(--text-3)',background:'none',border:'none',cursor:'pointer'}}>&#8635; Refresh</button>
    </div>
  </div>;
}

function EmailInboxPanel({onClose,loggedIn}){
  const [emails,setEmails]=React.useState(null);
  const [connected,setConnected]=React.useState(null);
  const [showConnect,setShowConnect]=React.useState(false);
  const [selectedEmail,setSelectedEmail]=React.useState(null);
  const [draft,setDraft]=React.useState('');
  const [draftLoading,setDraftLoading]=React.useState(false);
  const [sending,setSending]=React.useState(false);
  const [sentOk,setSentOk]=React.useState(false);

  const loadStatus=()=>{
    authFetch('/api/oauth/status').then(d=>{
      if(d) setConnected((d.integrations||[]).find(i=>i.integration==='gmail')||false);
    });
  };
  const loadInbox=()=>{
    authFetch('/api/email/inbox?limit=20').then(d=>{
      if(d) setEmails(d.emails||[]);
    });
  };
  React.useEffect(()=>{loadStatus();},[]);
  React.useEffect(()=>{if(connected)loadInbox();},[connected]);

  const getDraft=async(email)=>{
    setSelectedEmail(email);setDraft('');setSentOk(false);
    setDraftLoading(true);
    const d=await authFetch('/api/email/draft',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message_id:email.message_id,thread_id:email.thread_id,
        from_addr:email.from,subject:email.subject,snippet:email.snippet})
    }).catch(()=>null);
    setDraftLoading(false);
    if(d&&d.draft) setDraft(d.draft);
  };

  const sendDraft=async()=>{
    if(!selectedEmail||!draft.trim()) return;
    setSending(true);
    const d=await authFetch('/api/email/send',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({thread_id:selectedEmail.thread_id,to:selectedEmail.from,
        subject:'Re: '+selectedEmail.subject.replace(/^Re: /i,''),body:draft})
    }).catch(()=>null);
    setSending(false);
    if(d&&d.ok){setSentOk(true);setSelectedEmail(null);loadInbox();}
  };

  const panelStyle={position:'fixed',top:0,right:0,bottom:0,width:520,maxWidth:'100vw',
    background:'var(--bg1)',borderLeft:'1px solid var(--border)',zIndex:400,
    display:'flex',flexDirection:'column',overflow:'hidden'};

  return <div style={panelStyle}>
    {showConnect&&<GmailConnectModal onClose={()=>setShowConnect(false)} onConnected={()=>{setShowConnect(false);loadStatus();}}/>}
    <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
      <div style={{fontSize:14,fontWeight:600,color:'var(--text-1)'}}>My Email Inbox</div>
      <button onClick={onClose} style={{background:'none',border:'none',color:'var(--text-3)',cursor:'pointer',fontSize:18,padding:4}}>&#x2715;</button>
    </div>
    {connected===null
      ? <div style={{padding:40,textAlign:'center',color:'var(--text-3)'}}>Loading&#8230;</div>
      : !connected
        ? <div style={{padding:32,textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
            <div style={{fontSize:13,color:'var(--text-2)',lineHeight:1.7}}>
              Connect your Gmail account to see your email inbox here and let Donna draft replies for you.
            </div>
            <button onClick={()=>setShowConnect(true)} style={{background:'var(--teal)',color:'#000',border:'none',borderRadius:8,padding:'10px 20px',fontSize:13,fontWeight:600,cursor:'pointer'}}>
              Connect Gmail
            </button>
          </div>
        : <div style={{display:'flex',flex:1,overflow:'hidden'}}>
            {/* Email list */}
            <div style={{width:220,borderRight:'1px solid var(--border)',overflowY:'auto',flexShrink:0}}>
              <div style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:10,color:'var(--text-3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em'}}>
                  {connected.email_address||'Inbox'}
                </span>
                <button onClick={loadInbox} style={{background:'none',border:'none',color:'var(--text-3)',cursor:'pointer',fontSize:10}}>&#8635;</button>
              </div>
              {emails===null
                ? <div style={{padding:20,textAlign:'center',color:'var(--text-3)',fontSize:12}}>Loading&#8230;</div>
                : emails.length===0
                  ? <div style={{padding:20,textAlign:'center',color:'var(--text-3)',fontSize:12}}>No unread emails</div>
                  : emails.map(e=><div key={e.message_id} onClick={()=>getDraft(e)}
                      style={{padding:'10px 12px',borderBottom:'1px solid var(--border)',cursor:'pointer',
                        background:selectedEmail?.message_id===e.message_id?'var(--bg2)':'transparent'}}>
                      <div style={{fontSize:11,fontWeight:600,color:'var(--text-1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.from.split('<')[0].trim()||e.from}</div>
                      <div style={{fontSize:10,color:'var(--text-2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:1}}>{e.subject}</div>
                      <div style={{fontSize:9,color:'var(--text-3)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.snippet}</div>
                    </div>)
              }
              <div style={{padding:'10px 12px',borderTop:'1px solid var(--border)'}}>
                <button onClick={()=>setShowConnect(true)} style={{fontSize:10,color:'var(--text-3)',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>
                  Disconnect Gmail
                </button>
              </div>
            </div>
            {/* Draft panel */}
            <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
              {!selectedEmail
                ? <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-3)',fontSize:12,flexDirection:'column',gap:8}}>
                    <div>Select an email to draft a reply</div>
                    {sentOk&&<div style={{color:'var(--teal)',fontSize:11}}>&#10003; Email sent!</div>}
                  </div>
                : <div style={{flex:1,display:'flex',flexDirection:'column',padding:12,gap:8,overflow:'hidden'}}>
                    <div style={{background:'var(--bg0)',borderRadius:7,padding:'8px 10px',fontSize:11}}>
                      <div style={{fontWeight:600,color:'var(--text-1)',marginBottom:2}}>{selectedEmail.subject}</div>
                      <div style={{color:'var(--text-3)'}}>{selectedEmail.from}</div>
                      <div style={{color:'var(--text-2)',marginTop:4,lineHeight:1.6}}>{selectedEmail.snippet}</div>
                    </div>
                    <div style={{fontSize:10,color:'var(--text-3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>
                      Donna&#39;s draft reply:
                    </div>
                    {draftLoading
                      ? <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-3)',fontSize:12}}>Generating draft&#8230;</div>
                      : <textarea value={draft} onChange={e=>setDraft(e.target.value)} rows={8}
                          style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:7,
                            padding:'8px 10px',color:'var(--text-1)',fontSize:12,resize:'none',outline:'none',
                            lineHeight:1.6,fontFamily:'var(--sans)'}}/>
                    }
                    <div style={{display:'flex',gap:8,justifyContent:'flex-end',flexShrink:0}}>
                      <button onClick={()=>setSelectedEmail(null)} style={{background:'none',border:'1px solid var(--border)',borderRadius:6,padding:'6px 14px',fontSize:12,color:'var(--text-2)',cursor:'pointer'}}>
                        Cancel
                      </button>
                      <button onClick={sendDraft} disabled={sending||!draft.trim()||draftLoading}
                        style={{background:'var(--teal)',color:'#000',border:'none',borderRadius:6,padding:'6px 16px',fontSize:12,fontWeight:600,cursor:'pointer',
                          opacity:sending||!draft.trim()||draftLoading?0.5:1}}>
                        {sending?'Sending&#8230;':'Approve &amp; Send'}
                      </button>
                    </div>
                  </div>
              }
            </div>
          </div>
    }
  </div>;
}

function UserMgmtPanel({onClose}){
  const [users,setUsers]=React.useState([]);
  const [roles,setRoles]=React.useState({});
  const [saving,setSaving]=React.useState(null);
  const [editName,setEditName]=React.useState(null); // {username, value}
  const [addingUser,setAddingUser]=React.useState(false);
  const [newUser,setNewUser]=React.useState({username:'',display_name:'',role:'support'});
  const [addError,setAddError]=React.useState('');
  const ROLE_ORDER=['admin','manager','support','viewer'];
  const ROLE_COLOR={admin:'teal',manager:'amber',support:'green',viewer:'gray'};

  const load=()=>{
    authFetch('/api/users').then(d=>{
      if(d){setUsers(d.users||[]);setRoles(d.roles||{});}
    });
  };
  React.useEffect(load,[]);

  const setRole=async(username,role)=>{
    setSaving(username+'_role');
    await authFetch(`/api/users/${encodeURIComponent(username)}/role`,{
      method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({role})
    });
    setSaving(null);load();
  };

  const saveName=async(username,display_name)=>{
    if(!display_name.trim()) return;
    setSaving(username+'_name');
    await authFetch(`/api/users/${encodeURIComponent(username)}/name`,{
      method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({display_name:display_name.trim()})
    });
    setSaving(null);setEditName(null);load();
  };

  const createUser=async()=>{
    if(!newUser.username.trim()||!newUser.display_name.trim()){setAddError('Username and name required');return;}
    setSaving('new_user');setAddError('');
    const resp=await authFetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(newUser)});
    setSaving(null);
    if(resp&&resp.ok){setAddingUser(false);setNewUser({username:'',display_name:'',role:'support'});load();}
    else{setAddError(resp?.detail||'Failed to create user');}
  };

  const toggle=async(username,is_active)=>{
    setSaving(username+'_active');
    const ep=is_active?'deactivate':'activate';
    await authFetch(`/api/users/${encodeURIComponent(username)}/${ep}`,{method:'PATCH'});
    setSaving(null);load();
  };

  const panelStyle={position:'fixed',top:0,right:0,bottom:0,width:480,maxWidth:'100vw',
    background:'var(--bg1)',borderLeft:'1px solid var(--border)',zIndex:400,
    display:'flex',flexDirection:'column',overflow:'hidden'};
  const hdStyle={padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',
    alignItems:'center',justifyContent:'space-between',flexShrink:0};

  return <div style={panelStyle}>
    <div style={hdStyle}>
      <div style={{fontSize:14,fontWeight:600,color:'var(--text-1)'}}>User Management</div>
      <button onClick={onClose} style={{background:'none',border:'none',color:'var(--text-3)',cursor:'pointer',fontSize:18,padding:4}}>✕</button>
    </div>
    <div style={{padding:'12px 20px',borderBottom:'1px solid var(--border)',background:'var(--bg0)',flexShrink:0}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:11,color:'var(--text-3)'}}>Manage team access to Donna.</div>
        <button onClick={()=>setAddingUser(v=>!v)} style={{background:'var(--teal)',color:'#000',border:'none',borderRadius:5,padding:'4px 10px',fontSize:11,fontWeight:600,cursor:'pointer'}}>+ Add User</button>
      </div>
      {addingUser&&<div style={{marginTop:10,display:'flex',flexDirection:'column',gap:6}}>
        <input placeholder="Username / email" value={newUser.username} onChange={e=>setNewUser({...newUser,username:e.target.value})}
          style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:5,padding:'5px 8px',color:'var(--text-1)',fontSize:12,outline:'none'}}/>
        <input placeholder="Display name" value={newUser.display_name} onChange={e=>setNewUser({...newUser,display_name:e.target.value})}
          style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:5,padding:'5px 8px',color:'var(--text-1)',fontSize:12,outline:'none'}}/>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <select value={newUser.role} onChange={e=>setNewUser({...newUser,role:e.target.value})}
            style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:5,padding:'5px 8px',color:'var(--text-1)',fontSize:12,flex:1,outline:'none'}}>
            {['admin','manager','support','viewer'].map(r=><option key={r} value={r}>{r.charAt(0).toUpperCase()+r.slice(1)}</option>)}
          </select>
          <button onClick={createUser} disabled={saving==='new_user'}
            style={{background:'var(--teal)',color:'#000',border:'none',borderRadius:5,padding:'5px 12px',fontSize:11,fontWeight:600,cursor:'pointer'}}>
            {saving==='new_user'?'…':'Create'}
          </button>
          <button onClick={()=>setAddingUser(false)} style={{background:'none',border:'1px solid var(--border)',borderRadius:5,padding:'5px 8px',fontSize:11,color:'var(--text-3)',cursor:'pointer'}}>Cancel</button>
        </div>
        {addError&&<div style={{color:'var(--red)',fontSize:11}}>{addError}</div>}
      </div>}
    </div>
    <div style={{overflowY:'auto',flex:1,padding:'8px 0'}}>
      {ROLE_ORDER.map(role=>{
        const group=users.filter(u=>u.role===role);
        if(!group.length) return null;
        return <div key={role} style={{marginBottom:4}}>
          <div style={{padding:'10px 20px 4px',fontSize:10,fontWeight:700,
            color:'var(--text-3)',letterSpacing:'0.08em',textTransform:'uppercase'}}>
            {role} — {roles[role]?.split('—')[1]?.trim()||role}
          </div>
          {group.map(u=>{
            const initials=(u.display_name||u.username).slice(0,2).toUpperCase();
            const inactive=!u.is_active;
            return <div key={u.username} style={{padding:'10px 20px',borderBottom:'1px solid var(--border)',
              opacity:inactive?0.5:1,display:'flex',alignItems:'center',gap:12}}>
              {/* Avatar */}
              <div style={{width:36,height:36,borderRadius:'50%',background:`var(--${ROLE_COLOR[role]||'teal'}-dim)`,
                border:`1px solid var(--${ROLE_COLOR[role]||'teal'})`,display:'flex',alignItems:'center',
                justifyContent:'center',fontSize:11,fontWeight:700,color:`var(--${ROLE_COLOR[role]||'teal'})`,flexShrink:0}}>
                {initials}
              </div>
              {/* Info */}
              <div style={{flex:1,minWidth:0}}>
                {editName?.username===u.username
                  ? <div style={{display:'flex',gap:6}}>
                      <input value={editName.value} onChange={e=>setEditName({...editName,value:e.target.value})}
                        onKeyDown={e=>{if(e.key==='Enter')saveName(u.username,editName.value);if(e.key==='Escape')setEditName(null);}}
                        autoFocus
                        style={{flex:1,background:'var(--bg2)',border:'1px solid var(--teal)',borderRadius:5,
                          padding:'3px 8px',color:'var(--text-1)',fontSize:12,outline:'none'}}/>
                      <button onClick={()=>saveName(u.username,editName.value)}
                        style={{background:'var(--teal)',color:'#000',border:'none',borderRadius:5,
                          padding:'3px 10px',fontSize:11,fontWeight:600,cursor:'pointer'}}>
                        {saving===u.username+'_name'?'…':'Save'}
                      </button>
                      <button onClick={()=>setEditName(null)}
                        style={{background:'none',border:'1px solid var(--border)',borderRadius:5,
                          padding:'3px 8px',fontSize:11,color:'var(--text-3)',cursor:'pointer'}}>✕</button>
                    </div>
                  : <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <div style={{fontSize:13,fontWeight:500,color:'var(--text-1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {u.display_name||u.username.split('@')[0]}
                      </div>
                      <button onClick={()=>setEditName({username:u.username,value:u.display_name||''})}
                        style={{background:'none',border:'none',color:'var(--text-3)',cursor:'pointer',fontSize:10,padding:2,opacity:0.6}}>✎</button>
                    </div>
                }
                <div style={{fontSize:10,color:'var(--text-3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:1}}>
                  {u.username}
                </div>
                {u.last_login&&<div style={{fontSize:9,color:'var(--text-3)',marginTop:1}}>
                  Last login: {u.last_login.split('T')[0]||u.last_login.split(' ')[0]}
                </div>}
              </div>
              {/* WhatsApp number */}
              {editName?.username===u.username&&<div style={{fontSize:9,color:'var(--text-3)',marginTop:2,display:'flex',alignItems:'center',gap:4}}>
                <span>WA:</span>
                <input defaultValue={u.whatsapp_number||''} placeholder="+966..." onBlur={async e=>{
                  const wa=e.target.value.trim();
                  if(wa!==(u.whatsapp_number||'')) await authFetch(`/api/users/${encodeURIComponent(u.username)}/whatsapp`,{
                    method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({whatsapp_number:wa||null})
                  });
                  load();
                }} style={{width:110,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:4,padding:'2px 5px',color:'var(--text-1)',fontSize:10,outline:'none'}}/>
              </div>}
              {/* Role selector */}
              <select value={u.role}
                onChange={e=>setRole(u.username,e.target.value)}
                disabled={saving===u.username+'_role'}
                style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,
                  padding:'4px 8px',color:'var(--text-1)',fontSize:11,cursor:'pointer',outline:'none'}}>
                {ROLE_ORDER.map(r=><option key={r} value={r}>{r.charAt(0).toUpperCase()+r.slice(1)}</option>)}
              </select>
              {/* Active toggle */}
              <button onClick={()=>toggle(u.username,u.is_active)}
                disabled={saving===u.username+'_active'}
                title={inactive?'Activate user':'Deactivate user'}
                style={{background:inactive?'var(--bg3)':'var(--red-dim)',border:'none',borderRadius:5,
                  padding:'4px 8px',fontSize:10,color:inactive?'var(--text-3)':'var(--red)',
                  cursor:'pointer',flexShrink:0}}>
                {inactive?'Enable':'Disable'}
              </button>
            </div>;
          })}
        </div>;
      })}
      {users.length===0&&<div style={{padding:'40px 20px',textAlign:'center',color:'var(--text-3)',fontSize:13}}>
        No users yet — they appear on first login.
      </div>}
    </div>
  </div>;
}

  </div>;

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [user,setUser]=useState('');const [pass,setPass]=useState('');const [loading,setLoading]=useState(false);const [error,setError]=useState('');
  const handle=async e=>{
    e.preventDefault();
    if(!user.trim()||!pass.trim()){setError('Please fill in all fields.');return;}
    setError('');setLoading(true);
    try{
      const resp=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user.trim(),password:pass.trim()})});
      if(!resp.ok){const e=await resp.json().catch(()=>({}));setError(e.detail||'Invalid credentials');setLoading(false);return;}
      const data=await resp.json();
      const {token,username,role}=data;
      const name=data.display_name||username.split('@')[0];
      // Fetch permissions for this role
      let perms={};
      try{
        const pd=await fetch('/api/auth/permissions',{headers:{'Authorization':'Bearer '+token}});
        if(pd.ok){const pj=await pd.json();perms=pj.permissions||{};}
      }catch(e){}
      onLogin({name,initials:name.slice(0,2).toUpperCase(),role,token,username,permissions:perms});
    }catch(err){setError('Could not connect: '+err.message);setLoading(false);}
  };
  const inp={width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px',color:'var(--text-1)',fontSize:14,outline:'none',fontFamily:'var(--sans)',transition:'border-color 0.15s'};
  const lbl={fontSize:11,color:'var(--text-3)',marginBottom:6,fontWeight:500,letterSpacing:'0.04em',display:'block'};
  return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg0)',padding:16}}>
    <div style={{width:'100%',maxWidth:400,background:'var(--bg1)',border:'1px solid var(--border)',borderRadius:16,padding:'32px 28px',boxShadow:'0 24px 80px rgba(0,0,0,0.5)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:28}}>
        <div style={{width:38,height:38,borderRadius:9,background:'var(--teal)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="18" height="18" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="3" fill="#000" opacity="0.9"/><circle cx="7.5" cy="7.5" r="6.5" stroke="#000" strokeWidth="1.2" opacity="0.6"/></svg>
        </div>
        <div>
          <div style={{fontSize:18,fontWeight:700,letterSpacing:'0.04em',color:'var(--text-1)'}}>DONNA</div>
          <div style={{fontSize:10,color:'var(--text-3)',letterSpacing:'0.1em',textTransform:'uppercase'}}>Operations AI · botsolutions.tech</div>
        </div>
      </div>
      <div style={{fontSize:20,fontWeight:600,color:'var(--text-1)',marginBottom:4}}>Sign in</div>
      <div style={{fontSize:13,color:'var(--text-3)',marginBottom:24}}>Access the Donna dashboard</div>
      <form onSubmit={handle} style={{display:'flex',flexDirection:'column',gap:14}}>

// ── Message ordering utilities ────────────────────────────────────────────────
// Deterministic ID from DB row: stable across page loads so React never
// reassigns a DOM node to a different message.
function stableId(direction, timestamp, content) {
  const s = (direction||'') + '|' + (timestamp||'') + '|' + (content||'').slice(0,24);
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return 'db_' + (h >>> 0).toString(36);
}
// Unique ID for optimistic (locally-sent) messages.
function optId() {
  return 'opt_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
}
// Sort a message array by sortKey ascending.
// Normalises SQLite space format ('2026-04-29 10:00:00') and ISO T format
// ('2026-04-29T10:00:00.000Z') so they compare correctly as strings.
function normSortKey(sk) { return sk ? sk.replace(' ', 'T') : ''; }
function sortMsgs(msgs) {
  return [...msgs].sort((a, b) => {
    const ta = normSortKey(a.sortKey), tb = normSortKey(b.sortKey);
    return ta < tb ? -1 : ta > tb ? 1 : 0;
  });
}
// Deduplicate a merged message array by id, keeping the last occurrence.
function dedupMsgs(msgs) {
  const seen = new Map();
  for (const m of msgs) seen.set(m.id, m);
  return [...seen.values()];
}

      const key=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++) key[i]=raw.charCodeAt(i);
      const reg=await navigator.serviceWorker.ready;
      const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:key});
