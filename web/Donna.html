<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Donna"/>
<meta name="theme-color" content="#0ec4b4" media="(prefers-color-scheme: dark)"/>
<meta name="theme-color" content="#0ec4b4" media="(prefers-color-scheme: light)"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon.svg"/>
<link rel="icon" type="image/svg+xml" href="/icon.svg"/>
<title>Donna — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg0:#060d1a;--bg1:#0a1424;--bg2:#0f1c30;--bg3:#152238;
  --border:#1c2f48;--border-hi:#243d5c;
  --teal:#0ec4b4;--teal-dim:rgba(14,196,180,0.12);--teal-mid:rgba(14,196,180,0.22);
  --green:#10d474;--green-dim:rgba(16,212,116,0.12);
  --amber:#f5a623;--amber-dim:rgba(245,166,35,0.12);
  --red:#f25c54;--red-dim:rgba(242,92,84,0.12);
  --yellow:#f5d623;--yellow-dim:rgba(245,214,35,0.10);
  --text-1:#dce8f5;--text-2:#7a96b8;--text-3:#4a6280;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --sidebar-w:268px;--tools-w:252px;
}
[data-theme="light"]{
  --bg0:#f0f2f5;--bg1:#ffffff;--bg2:#f5f7fa;--bg3:#eaecf0;
  --border:#dde1e8;--border-hi:#c8cdd8;
  --text-1:#0f1923;--text-2:#4d6070;--text-3:#8a9bb0;
  --teal-dim:rgba(14,196,180,0.10);--teal-mid:rgba(14,196,180,0.16);
  --green-dim:rgba(5,150,80,0.10);--red-dim:rgba(200,50,44,0.10);
  --amber-dim:rgba(180,110,0,0.10);--yellow-dim:rgba(180,160,0,0.10);
}
html,body,#root{height:100%;height:100dvh;overflow:hidden;background:var(--bg0);font-family:var(--sans);color:var(--text-1);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:4px;}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;}
input,textarea{font-family:var(--sans);}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes blink{0%,80%,100%{opacity:0.2;transform:scale(0.9);}40%{opacity:1;transform:scale(1.1);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.75;transform:scale(1.15);}}
@keyframes slideIn{from{transform:translateX(-100%);}to{transform:translateX(0);}}

/* ── DESKTOP layout ── */
.app-shell{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;}
.app-body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:var(--sidebar-w);flex-shrink:0;display:flex;flex-direction:column;background:var(--bg1);border-right:1px solid var(--border);transition:transform 0.25s ease;}
.main-area{flex:1;display:flex;overflow:hidden;}
.chat-col{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:0;}
.tools-panel{width:var(--tools-w);flex-shrink:0;display:flex;flex-direction:column;background:var(--bg1);overflow:hidden;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;}
.mob-nav{display:none;}
.mob-header-btn{display:none;}

/* ── MOBILE layout (≤768px) ── */
@media(max-width:768px){
  :root{--sidebar-w:88vw;--tools-w:100vw;}

  /* Sidebar: off-canvas drawer */
  .sidebar{
    position:fixed;top:0;left:0;height:100%;
    width:var(--sidebar-w);max-width:320px;
    z-index:300;overflow-y:auto;
    transform:translateX(-110%);
    transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
    box-shadow:4px 0 40px rgba(0,0,0,0.7);
    display:flex;flex-direction:column;
  }
  .sidebar.open{transform:translateX(0);}

  /* Overlay: visible on mobile only */
  .overlay.open{display:block;}
  .mob-header-btn{display:flex;}

  /* Main area: full width since sidebar is off-canvas */
  .main-area{width:100vw;}

  /* Chat column: full width, no right border */
  .chat-col{width:100%;border-right:none;min-width:0;}

  /* Tools panel: bottom sheet */
  .tools-panel{
    position:fixed;bottom:0;left:0;right:0;z-index:250;
    height:75vh;max-height:600px;
    border-radius:20px 20px 0 0;
    border-top:1px solid var(--border-hi);
    transform:translateY(110%);
    transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
    background:var(--bg1);overflow:hidden;
    display:flex;flex-direction:column;
  }
  .tools-panel.open{transform:translateY(0);}

  /* Bottom nav bar */
  .mob-nav{
    display:flex;height:56px;flex-shrink:0;
    background:var(--bg1);border-top:1px solid var(--border);
    align-items:stretch;z-index:100;
    padding-bottom:env(safe-area-inset-bottom,0px);
  }
  .mob-nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:3px;font-size:10px;
    color:var(--text-3);cursor:pointer;border:none;background:none;
    padding:8px 4px;transition:color 0.15s;
    -webkit-tap-highlight-color:transparent;
    position:relative;
  }
  .mob-nav-btn.active{color:var(--teal);}
  .mob-nav-btn svg{opacity:0.7;}
  .mob-nav-btn.active svg{opacity:1;}

  /* Chat */
  .chat-messages{padding:12px 10px;}
  .msg-bubble{max-width:90%;}

  /* Input area */
  .chat-input-area{
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));
  }

  /* Status bar: hidden */
  .status-bar{display:none !important;}

  /* Header user pill: hidden */
  .header-user-pill{display:none !important;}

  /* Header */
  .app-header{padding:0 10px;}
}

/* Desktop: never show overlay */
@media(min-width:769px){
  .overlay{display:none !important;}
}

/* Safe area */
@supports(padding:env(safe-area-inset-bottom)){
  .mob-nav{padding-bottom:env(safe-area-inset-bottom);}
  .chat-input-area{padding-bottom:calc(8px + env(safe-area-inset-bottom));}
}

/* Tablet */
@media(min-width:769px) and (max-width:1024px){
  :root{--sidebar-w:220px;--tools-w:210px;}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ─── API ──────────────────────────────────────────────────────────────────────
const API=window.location.origin;
function _getToken(){try{const s=localStorage.getItem('donna-user');return s?JSON.parse(s).token:null;}catch{return null;}}
async function authFetch(path,opts={}){
  const token=_getToken();
  if(token){opts.headers={...(opts.headers||{}),Authorization:'Bearer '+token};}
  const res=await fetch(API+path,opts);
  if(res.status===401){localStorage.removeItem('donna-user');window.location.reload();return;}
  if(!res.ok)throw new Error(`HTTP ${res.status}: ${await res.text().catch(()=>'')}`);
  return res.json();
}
const fetchApi=authFetch;

// ─── STATIC DATA ──────────────────────────────────────────────────────────────
const TEAM_STATIC=[
  {id:'talha',  name:'Talha',      role:'Project Lead',   status:'online',avatar:'T',whatsapp:'+966546065347'},
  {id:'albaraa',name:'Al Baraa',   role:'Implementation', status:'away',  avatar:'A',whatsapp:'+966544272725'},
];

const TOOLS=[
  {section:'Financial',adminOnly:true,items:[
    {id:'overdue_invoices',    label:'Overdue Invoices'},
    {id:'collections_tracker', label:'Collections Tracker'},
    {id:'payables_summary',    label:'Payables Summary'},
    {id:'daily_financial',     label:'Daily Financial'},
    {id:'pl_overview',         label:'P&L Overview'},
    {id:'payment_patterns',    label:'Payment Patterns'},
    {id:'proforma_conversions',label:'Proforma Conversions'},
  ]},
  {section:'Operations',items:[
    {id:'open_tickets',   label:'Open Tickets'},
    {id:'overdue_tickets',label:'Overdue Tickets'},
    {id:'create_ticket',  label:'Create Ticket'},
    {id:'zatca_status',   label:'ZATCA Status'},
  ]},
  {section:'Communication',items:[
    {id:'send_whatsapp',label:'Send WhatsApp'},
    {id:'send_email',   label:'Send Email'},
  ]},
  {section:'System',adminOnly:true,items:[
    {id:'donna_suggestions',label:'Suggestions Log'},
    {id:'session_log',      label:'Session Log'},
    {id:'wa_settings',      label:'WhatsApp Settings'},
  ]},
];

// ─── UI PRIMITIVES ────────────────────────────────────────────────────────────
const Badge=({color,children})=>{
  const c={
    green:{bg:'var(--green-dim)',text:'var(--green)'},
    red:  {bg:'var(--red-dim)',  text:'var(--red)'},
    amber:{bg:'var(--amber-dim)',text:'var(--amber)'},
    teal: {bg:'var(--teal-dim)', text:'var(--teal)'},
  }[color]||{bg:'var(--teal-dim)',text:'var(--teal)'};
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,background:c.bg,color:c.text,borderRadius:4,padding:'2px 8px',fontSize:11,fontWeight:600,fontFamily:'var(--mono)'}}>
    <span style={{width:5,height:5,borderRadius:'50%',background:c.text,flexShrink:0}}/>{children}
  </span>;
};

const MiniTable=({headers,rows})=>(
  <div style={{overflowX:'auto',marginTop:8,WebkitOverflowScrolling:'touch'}}>
    <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,fontFamily:'var(--mono)',minWidth:400}}>
      <thead><tr>{headers.map(h=><th key={h} style={{textAlign:'left',padding:'6px 10px',color:'var(--text-3)',borderBottom:'1px solid var(--border)',fontWeight:500,fontSize:11,whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
      <tbody>{rows.map((row,i)=><tr key={i} style={{borderBottom:'1px solid var(--border)'}}>{row.map((cell,j)=><td key={j} style={{padding:'7px 10px',color:'var(--text-1)',whiteSpace:'nowrap',verticalAlign:'middle'}}>{cell}</td>)}</tr>)}</tbody>
    </table>
  </div>
);

const MetricRow=({metrics})=>(
  <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
    {metrics.map(m=>(
      <div key={m.label} style={{background:'var(--bg0)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',flex:'1 1 80px',minWidth:80}}>
        <div style={{fontSize:10,color:'var(--text-3)',marginBottom:4,textTransform:'uppercase',letterSpacing:'0.06em'}}>{m.label}</div>
        <div style={{fontSize:18,fontWeight:600,color:m.color||'var(--text-1)',fontFamily:'var(--mono)'}}>{m.value}</div>
        {m.sub&&<div style={{fontSize:10,color:'var(--text-3)',marginTop:2}}>{m.sub}</div>}
      </div>
    ))}
  </div>
);

const fmt=n=>'SAR '+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
function Divider(){return <span style={{margin:'0 8px',color:'var(--border-hi)'}}>·</span>;}

// ─── TOOL COMPONENTS ──────────────────────────────────────────────────────────
function ApiOverdueInvoices({data}){
  if(!data?.invoices?.length) return <div style={{marginTop:8,color:'var(--green)',fontSize:13}}>No overdue invoices.</div>;
  const rows=data.invoices.map(x=>[x.customer||x.party||'—',x.name,fmt(x.outstanding_amount||0),String(x.due_date||'').slice(0,10),`${x.days_late||0}d`,<Badge color={x.days_late>30?'red':x.days_late>7?'amber':'teal'}>{x.days_late>30?'Critical':x.days_late>7?'Overdue':'Grace'}</Badge>]);
  return <MiniTable headers={['Client','Invoice','Amount','Due','OD','Status']} rows={rows}/>;
}
function ApiCollections({data}){
  if(!data?.escalations?.length) return <div style={{marginTop:8,color:'var(--text-3)',fontSize:13}}>No active collections escalations.</div>;
  const rows=data.escalations.map(x=>[x.customer||'—',x.invoice_name||'—',fmt(x.amount||0),`${x.days_overdue||0}d`,<Badge color={x.times_flagged>=14?'red':'amber'}>{x.times_flagged>=14?'Escalated':'Warning'}</Badge>]);
  return <MiniTable headers={['Client','Invoice','Amount','Overdue','Status']} rows={rows}/>;
}
function ApiPayables({data}){
  if(!data?.payables?.length) return <div style={{marginTop:8,color:'var(--green)',fontSize:13}}>No overdue payables.</div>;
  const rows=data.payables.map(x=>[x.supplier||x.party||'—',fmt(x.outstanding_amount||0),String(x.due_date||'').slice(0,10),<Badge color={x.days_late>0?'red':'green'}>{x.days_late>0?`${x.days_late}d OD`:'OK'}</Badge>]);
  return <><div style={{marginTop:8,padding:'6px 10px',background:'var(--red-dim)',borderRadius:6,fontSize:12,color:'var(--red)'}}>Total owed: {fmt(data.total_owed||0)}</div><MiniTable headers={['Vendor','Amount','Due','Status']} rows={rows}/></>;
}
function ApiDailyFinancial({data}){
  if(!data) return null;
  return <MetricRow metrics={[
    {label:'Invoices 7d',value:String(data.invoices_this_week||0)},
    {label:'Payments 7d',value:String(data.payments_this_week||0),color:'var(--green)'},
    {label:'Overdue',value:fmt(data.overdue_total||0),color:'var(--red)'},
    {label:'Proformas',value:String(data.proforma_count||0),color:'var(--amber)'},
  ]}/>;
}
function ApiPL({data}){
  if(!data) return null;
  const margin=data.revenue>0?((data.net/data.revenue)*100).toFixed(1):'0.0';
  return <MetricRow metrics={[
    {label:'Revenue 30d',value:fmt(data.revenue||0),color:'var(--teal)'},
    {label:'Expenses',value:fmt(data.expenses||0)},
    {label:'Net',value:fmt(data.net||0),color:(data.net||0)>=0?'var(--green)':'var(--red)',sub:`${margin}% margin`},
  ]}/>;
}
function ApiPaymentPatterns({data}){
  if(!data?.patterns?.length) return <div style={{marginTop:8,color:'var(--text-3)',fontSize:13}}>Not enough data.</div>;
  const rows=data.patterns.slice(0,10).map(x=>[x.customer,`${x.avg_days_to_pay}d`,<Badge color={x.status==='late'?'amber':'green'}>{x.status==='late'?'Slow':'Good'}</Badge>,x.payments_count+' pmts']);
  return <MiniTable headers={['Client','Avg Days','Reliability','Count']} rows={rows}/>;
}
function ApiProformas({data}){
  if(!data?.proformas?.length) return <div style={{marginTop:8,color:'var(--green)',fontSize:13}}>No unconverted proformas.</div>;
  const rows=data.proformas.map(x=>[x.name,x.customer||'—',fmt(x.grand_total||0),<Badge color={x.per_billed>50?'teal':'amber'}>{x.status||'Pending'}</Badge>]);
  return <><div style={{marginTop:8,padding:'6px 10px',background:'var(--amber-dim)',borderRadius:6,fontSize:12,color:'var(--amber)'}}>Pipeline: {fmt(data.total_value||0)}</div><MiniTable headers={['Proforma','Client','Value','Status']} rows={rows}/></>;
}
function ApiOpenTickets({data}){
  if(!data?.tickets?.length) return <div style={{marginTop:8,color:'var(--green)',fontSize:13}}>No open tickets.</div>;
  const rows=data.tickets.slice(0,10).map(x=>[x.name,(x.subject||'').slice(0,35),x.priority||'Med',<Badge color={x.priority==='Urgent'||x.priority==='High'?'red':'amber'}>{x.priority||'Med'}</Badge>]);
  return <MiniTable headers={['#','Subject','Priority','Badge']} rows={rows}/>;
}
function ApiOverdueTickets({data}){
  if(!data?.tickets?.length) return <div style={{marginTop:8,color:'var(--green)',fontSize:13}}>No SLA breaches.</div>;
  const rows=data.tickets.slice(0,10).map(x=>[x.name,(x.subject||'').slice(0,30),`${Math.round(x.age_hours||0)}h`,`${x.sla_hours||0}h SLA`,<Badge color='red'>Breached</Badge>]);
  return <MiniTable headers={['#','Subject','Age','SLA','Status']} rows={rows}/>;
}
function ApiZatca({data}){
  if(!data?.issues?.length) return <div style={{marginTop:8,padding:'10px 14px',background:'var(--green-dim)',border:'1px solid rgba(16,212,116,0.2)',borderRadius:8,fontSize:13,color:'var(--green)'}}>ZATCA: all clear.</div>;
  const rows=data.issues.map(x=>[x.invoice_reference||x.name,x.status||'—',x.zatca_status||'—',String(x.creation||'').slice(0,10)]);
  return <><div style={{marginTop:8,padding:'6px 10px',background:'var(--red-dim)',borderRadius:6,fontSize:12,color:'var(--red)'}}>{data.count} issue(s)</div><MiniTable headers={['Invoice','Status','ZATCA','Date']} rows={rows}/></>;
}
function ApiSuggestions({data}){
  if(!data?.suggestions?.length) return <div style={{marginTop:8,color:'var(--text-3)',fontSize:13}}>No suggestions.</div>;
  return <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:8}}>
    {data.suggestions.map((s,i)=>(
      <div key={i} style={{padding:'9px 12px',background:'var(--bg0)',borderLeft:`3px solid var(--${s.priority==='high'?'red':s.priority==='medium'?'amber':'teal'})`,borderRadius:'0 7px 7px 0',fontSize:12}}>
        <div style={{color:'var(--text-3)',fontSize:10,marginBottom:3}}>{s.date_noticed||''} · {s.priority||''}</div>
        <div style={{color:'var(--text-1)',lineHeight:1.5}}>{s.description}</div>
      </div>
    ))}
  </div>;
}
function ApiSessionLog({data}){
  if(!data?.content) return <div style={{marginTop:8,color:'var(--text-3)',fontSize:13}}>No session log.</div>;
  return <div style={{marginTop:8,background:'var(--bg0)',border:'1px solid var(--border)',borderRadius:8,padding:'12px',maxHeight:300,overflowY:'auto',fontSize:11,lineHeight:1.7,fontFamily:'var(--mono)',color:'var(--text-2)',whiteSpace:'pre-wrap'}}>{data.content.split('\n').slice(-60).join('\n')}</div>;
}

let _teamContacts=[];
function ApiSendWhatsApp(){
  const [to,setTo]=useState('');const [msg,setMsg]=useState('');const [status,setStatus]=useState(null);const [loading,setLoading]=useState(false);
  const send=async()=>{if(!to||!msg)return;setLoading(true);try{await fetchApi('/api/tools/send-whatsapp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to,message:msg})});setStatus({ok:true,msg:'Sent!'});}catch(e){setStatus({ok:false,msg:e.message});}setLoading(false);};
  if(status) return <div style={{marginTop:8,color:status.ok?'var(--green)':'var(--red)',fontSize:13}}>{status.ok?'✓ ':''}{status.msg}<button onClick={()=>setStatus(null)} style={{marginLeft:8,background:'none',border:'none',cursor:'pointer',color:'var(--text-3)',fontSize:11}}>Send another</button></div>;
  const inp={background:'var(--bg0)',border:'1px solid var(--border)',borderRadius:6,padding:'9px 12px',color:'var(--text-1)',fontSize:13,outline:'none',width:'100%'};
  const contacts=_teamContacts.filter(m=>m.whatsapp);
  return <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:8}}>
    {contacts.length>0&&<select value={to} onChange={e=>setTo(e.target.value)} style={{...inp,color:to?'var(--text-1)':'var(--text-3)'}}>
      <option value="">— Pick team contact —</option>
      {contacts.map(m=><option key={m.id} value={m.whatsapp}>{m.name} ({m.whatsapp})</option>)}
    </select>}
    <input value={to} onChange={e=>setTo(e.target.value)} placeholder="+966XXXXXXXXX (or pick above)" style={inp}/>
    <textarea value={msg} onChange={e=>setMsg(e.target.value)} rows={3} placeholder="Message..." style={{...inp,resize:'none'}}/>
    <button onClick={send} disabled={loading||!to||!msg} style={{background:'#25d366',color:'#fff',borderRadius:6,padding:'9px 16px',fontSize:13,fontWeight:600,opacity:(loading||!to||!msg)?0.55:1,alignSelf:'flex-start'}}>{loading?'Sending…':'Send WhatsApp'}</button>
  </div>;
}
function ApiSendEmail(){
  const [to,setTo]=useState('');const [subj,setSubj]=useState('');const [body,setBody]=useState('');const [status,setStatus]=useState(null);const [loading,setLoading]=useState(false);
  const send=async()=>{if(!to||!subj)return;setLoading(true);try{await fetchApi('/api/tools/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to,subject:subj,message:body})});setStatus({ok:true});}catch(e){setStatus({ok:false,msg:e.message});}setLoading(false);};
  if(status) return <div style={{marginTop:8,color:status.ok?'var(--green)':'var(--red)',fontSize:13}}>{status.ok?'✓ Email sent.':status.msg}</div>;
  const inp={background:'var(--bg0)',border:'1px solid var(--border)',borderRadius:6,padding:'9px 12px',color:'var(--text-1)',fontSize:13,outline:'none',width:'100%'};
  return <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:8}}>
    <input value={to} onChange={e=>setTo(e.target.value)} placeholder="To: email@example.com" style={inp}/>
    <input value={subj} onChange={e=>setSubj(e.target.value)} placeholder="Subject" style={inp}/>
    <textarea value={body} onChange={e=>setBody(e.target.value)} rows={3} placeholder="Body..." style={{...inp,resize:'none'}}/>
    <button onClick={send} disabled={loading} style={{background:'var(--teal)',color:'#000',borderRadius:6,padding:'9px 16px',fontSize:13,fontWeight:600,opacity:loading?0.6:1,alignSelf:'flex-start'}}>{loading?'Sending…':'Send Email'}</button>
  </div>;
}
function ApiCreateTicket(){
  const [title,setTitle]=useState('');const [desc,setDesc]=useState('');const [priority,setPriority]=useState('Medium');const [done,setDone]=useState(null);const [loading,setLoading]=useState(false);
  const create=async()=>{if(!title)return;setLoading(true);try{const r=await fetchApi('/api/tools/create-ticket',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,description:desc,priority})});setDone(r.ticket_name||'created');}catch(e){setDone('error: '+e.message);}setLoading(false);};
  if(done) return <div style={{marginTop:8,padding:'10px 14px',background:done.startsWith('error')?'var(--red-dim)':'var(--green-dim)',borderRadius:8,fontSize:13,color:done.startsWith('error')?'var(--red)':'var(--green)'}}>{done.startsWith('error')?done:'✓ Ticket '+done+' created.'}</div>;
  const inp={background:'var(--bg0)',border:'1px solid var(--border)',borderRadius:6,padding:'9px 12px',color:'var(--text-1)',fontSize:13,outline:'none',width:'100%'};
  return <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:8}}>
    <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Ticket title..." style={inp}/>
    <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={2} placeholder="Description..." style={{...inp,resize:'none'}}/>
    <select value={priority} onChange={e=>setPriority(e.target.value)} style={{...inp}}><option>Urgent</option><option>High</option><option>Medium</option><option>Low</option></select>
    <button onClick={create} disabled={loading} style={{background:'var(--teal)',color:'#000',borderRadius:6,padding:'9px 16px',fontSize:13,fontWeight:600,opacity:loading?0.6:1,alignSelf:'flex-start'}}>{loading?'Creating…':'Create Ticket'}</button>
  </div>;
}

function inlineMarkdown(text,ki){
  const parts=text.split(/(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/g);
  return parts.map((p,i)=>{
    if(p.startsWith('**')&&p.endsWith('**')) return <strong key={ki+'b'+i}>{p.slice(2,-2)}</strong>;
    if(p.startsWith('*')&&p.endsWith('*')) return <em key={ki+'i'+i}>{p.slice(1,-1)}</em>;
    if(p.startsWith('`')&&p.endsWith('`')) return <code key={ki+'c'+i} style={{background:'var(--bg3)',borderRadius:3,padding:'1px 5px',fontSize:'0.9em',fontFamily:'var(--mono)'}}>{p.slice(1,-1)}</code>;
    return p;
  });
}
function parseMarkdown(text){
  if(!text) return null;
  const lines=text.split('\n');
  return lines.map((line,li)=>{
    const hm=line.match(/^(#{1,3})\s+(.+)/);
    if(hm){const sz=[18,15,13][hm[1].length-1]||13;return <div key={li} style={{fontWeight:700,fontSize:sz,marginTop:8,marginBottom:2,color:'var(--text-1)'}}>{inlineMarkdown(hm[2],li)}</div>;}
    if(/^[-+]\s/.test(line)){return <div key={li} style={{display:'flex',gap:6,marginTop:2}}><span style={{color:'var(--teal)',flexShrink:0}}>•</span><span>{inlineMarkdown(line.slice(2),li)}</span></div>;}
    const nm=line.match(/^(\d+)\.\s+(.+)/);
    if(nm){return <div key={li} style={{display:'flex',gap:6,marginTop:2}}><span style={{color:'var(--teal)',flexShrink:0,minWidth:16}}>{nm[1]}.</span><span>{inlineMarkdown(nm[2],li)}</span></div>;}
    if(!line.trim()) return <div key={li} style={{height:6}}/>;
    return <div key={li}>{inlineMarkdown(line,li)}</div>;
  });
}

  const isRight=isCustomerThread?msg.from==='donna':msg.from==='user';
  const isDonna=msg.from==='donna';
  const isHuman=msg.asHuman||msg.handled_by==='human';
  const ApiComp=msg.apiToolId&&TOOL_API_MAP[msg.apiToolId]?TOOL_API_MAP[msg.apiToolId].Comp:null;
  const bubbleStyle={
    background:isRight?'var(--teal-mid)':'var(--bg3)',
    border:`1px solid ${isRight?'rgba(14,196,180,0.3)':'var(--border)'}`,
    borderRadius:isRight?'12px 12px 4px 12px':'12px 12px 12px 4px',
    padding:'10px 14px',fontSize:13,lineHeight:1.6,color:'var(--text-1)',
  };

    <div style={{maxWidth:'82%'}}>
      <div style={bubbleStyle}>
        <div>{parseMarkdown(msg.text||'')}</div>
        {ApiComp&&<>
          <ApiComp data={msg.apiData}/>
          <div style={{fontSize:10,color:'var(--text-3)',marginTop:6,fontFamily:'var(--mono)'}}>Updated {msg.ts}</div>
        </>}
      </div>
      <div style={{fontSize:10,color:'var(--text-3)',marginTop:4,fontFamily:'var(--mono)',display:'flex',alignItems:'center',gap:6,justifyContent:isRight?'flex-end':'flex-start'}}>
        <span>{msg.ts}{isHuman?' · You':''}</span>
        {isDonna&&!ApiComp&&<button onClick={()=>navigator.clipboard?.writeText(msg.text||'').catch(()=>{})} title="Copy message" style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-3)',padding:'0 2px',borderRadius:3,lineHeight:1,opacity:0.55,fontSize:11}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0.55}>

        </button>}

}

  const msgIdRef=useRef(100);
  const lastApiMsgCountRef=useRef({});

  // Load admin conversation history from server on login
  useEffect(()=>{
    if(!loggedIn) return;
    authFetch('/api/admin/conversation').then(d=>{
      if(d&&d.messages&&d.messages.length>0){
        const msgs=d.messages.map((m,i)=>({
          id:'hist_'+i,
          from:m.direction==='inbound'?'user':'donna',
          text:m.message_content||'',
          ts:(m.timestamp||'').slice(11,16),
        }));
        setThreads(prev=>({...prev,donna:[...msgs]}));
      }
    }).catch(()=>{});
  },[loggedIn]);

  // Poll notifications every 30s
  useEffect(()=>{
    if(!loggedIn) return;
    const load=()=>{
      authFetch('/api/notifications').then(d=>{
        if(d){setNotifications(d.notifications||[]);setUnreadNotifs(d.unread||0);}
      }).catch(()=>{});
    };
    load();
    const id=setInterval(load,30000);
    return ()=>clearInterval(id);
  },[loggedIn]);

  // Web Push init
  useEffect(()=>{
    const supported='serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
    setPushSupported(supported);
    if(!supported) return;
    // Restore enabled state + verify subscription still valid
    const saved=localStorage.getItem('donna-push');
    if(saved==='on'){
      setPushEnabled(true);
      navigator.serviceWorker.ready.then(reg=>reg.pushManager.getSubscription()).then(sub=>{
        if(!sub){localStorage.removeItem('donna-push');setPushEnabled(false);}
      }).catch(()=>{});
    }
  },[]);

  async function enablePush(){
    if(pushLoading) return;
    setPushLoading(true);
    try{
      const perm=await Notification.requestPermission();
      if(perm!=='granted'){alert('Please allow notifications to enable push alerts.');setPushLoading(false);return;}
      const {publicKey}=await authFetch('/api/push/vapid-public-key');
      // Convert URL-safe base64 to Uint8Array
      const raw=atob(publicKey.replace(/-/g,'+').replace(/_/g,'/'));
      const key=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++) key[i]=raw.charCodeAt(i);
      const reg=await navigator.serviceWorker.ready;
      const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:key});
      await authFetch('/api/push/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subscription:sub.toJSON()})});
      localStorage.setItem('donna-push','on');
      setPushEnabled(true);
    }catch(e){
      console.error('Push enable failed:',e);
      alert('Could not enable push notifications: '+e.message);
    }finally{setPushLoading(false);}
  }

  async function disablePush(){
    if(pushLoading) return;
    setPushLoading(true);
    try{
      const reg=await navigator.serviceWorker.ready;
      const sub=await reg.pushManager.getSubscription();
      if(sub){
        await authFetch('/api/push/unsubscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint:sub.endpoint})});
        await sub.unsubscribe();
      }
      localStorage.removeItem('donna-push');
      setPushEnabled(false);
    }catch(e){
      console.error('Push disable failed:',e);
    }finally{setPushLoading(false);}
  }

  // Capture PWA install prompt
  useEffect(()=>{
    const handler=e=>{e.preventDefault();setInstallPrompt(e);};
    window.addEventListener('beforeinstallprompt',handler);
    window.addEventListener('appinstalled',()=>{setInstallDone(true);setInstallPrompt(null);localStorage.setItem('donna-installed','1');});
    return ()=>window.removeEventListener('beforeinstallprompt',handler);
  },[]);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
    localStorage.setItem('donna-theme',isDark?'dark':'light');
  },[isDark]);

  useEffect(()=>{setIntervening(false);},[activeThread]);

  // Status poll (tracks consecutive failures for offline banner)
  useEffect(()=>{
    const load=()=>fetchApi('/api/status')
      .then(d=>{setStatusData(d);setStatusFailCount(0);})
      .catch(()=>setStatusFailCount(c=>c+1));
    load();
    const id=setInterval(load,60000);
    return ()=>clearInterval(id);
  },[]);

  // Browser tab title + PWA badge
  useEffect(()=>{
    const total=Object.values(unreadCounts).reduce((a,b)=>a+b,0)+(unreadNotifs||0);
    document.title=total>0?`(${total}) Donna — Operations`:'Donna — Operations';
    if('setAppBadge' in navigator){
      if(total>0) navigator.setAppBadge(total).catch(()=>{});
      else navigator.clearAppBadge().catch(()=>{});
    }
  },[unreadCounts,unreadNotifs]);

  // URL param handler: notification clicks open the right thread/tool
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const customer=params.get('customer');
    const tab=params.get('tab');
    const tool=params.get('tool');
    if(customer){setActiveThread(customer);window.history.replaceState({},'','/');return;}
    if(tab==='reports'){/* open reports - handled by sidebar */}
    if(tool){setActiveTool(tool);setToolsOpen(true);window.history.replaceState({},'','/');}
  },[]);

  // Team members poll (60s interval)
  useEffect(()=>{
    const loadTeam=()=>{
      fetchApi('/api/team/members').then(d=>{
        if(d&&d.members&&d.members.length>0){
          const members=d.members.map(m=>({
            id:(m.name||'').toLowerCase().replace(/\s+/g,''),
            name:m.name,
            role:m.role||'Team',
            status:m.window_active?'online':'away',
            avatar:(m.name||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase(),
            whatsapp:m.whatsapp||'',
            window_active:m.window_active||0,
          }));
          setLiveTeam(members);
          const idMap={};
          members.forEach(m=>{idMap[m.id]=m.name;});
          setTeamIdMap(idMap);
        }
      }).catch(()=>{});
    };
    loadTeam();
    const id=setInterval(loadTeam,60000);
    return ()=>clearInterval(id);
  },[]);

  // Customer list poll
  useEffect(()=>{
    const load=()=>{
      if(document.visibilityState==='hidden') return;
      fetchApi('/api/customers').then(d=>{
        if(d&&d.customers) setLiveCustomers(d.customers.map(c=>({
          id:c.phone_number,name:c.name||c.phone_number,company:c.company||'',
          phone:c.phone_number,status:c.status_color||'green',
          filter:c.escalation_status==='pending'||c.escalation_status==='taken'?'flagged':c.last_message?'active':'waiting',
          lastMsg:c.last_message||'No messages yet',
          lastTime:c.last_message_time?(c.last_message_time||'').slice(11,16):'',
          flagReason:c.escalation_reason||'',
        })));
      }).catch(()=>{});
      fetchApi('/api/escalations').then(d=>{if(d&&d.escalations)setEscalations(d.escalations);}).catch(()=>{});
    };
    load();
    const id=setInterval(load,30000);
    return ()=>clearInterval(id);
  },[customerRefreshKey]);

  // Active customer conversation poll
  useEffect(()=>{
    if(!activeThread||!activeThread.startsWith('+')){setLiveCustomerMsgs([]);return;}
    const load=()=>{
      if(document.visibilityState==='hidden') return;
      const enc=encodeURIComponent(activeThread);
      fetchApi(`/api/customers/${enc}/conversation`).then(d=>{
        if(d&&d.messages){
          setLiveCustomerMsgs(d.messages.map((m,i)=>({
            id:'cust_'+i,
            from:m.direction==='inbound'?'customer':'donna',
            text:m.message_content||'',
            ts:(m.timestamp_saudi||m.timestamp||'').slice(11,16),
            handled_by:m.handled_by,
          })));
          const cnt=d.messages.filter(m=>m.direction==='inbound').length;
          const prev=prevMsgCountRef.current[activeThread]||0;
          if(cnt>prev) setUnreadCounts(u=>({...u,[activeThread]:(u[activeThread]||0)+(cnt-prev)}));
          prevMsgCountRef.current[activeThread]=cnt;
        }
      }).catch(()=>{});
    };
    load();
    const id=setInterval(load,8000);
    return ()=>clearInterval(id);
  },[activeThread]);

  // Active team conversation poll (10s interval) — merge-aware to preserve optimistic messages
  useEffect(()=>{
    if(!activeThread||!teamIdMap[activeThread])return;
    const memberName=teamIdMap[activeThread];
    const load=()=>{
      authFetch(`/api/team/conversations/${encodeURIComponent(memberName)}`)
        .then(d=>{
          if(d&&d.messages){
            const apiMsgs=d.messages.map((m,i)=>({
              id:'team_api_'+i,
              from:m.direction==='outbound'?'donna':'user',
              text:m.message_content||'',
              ts:(m.timestamp||'').slice(11,16),
            }));
            const prevCount=lastApiMsgCountRef.current[activeThread]||0;
            const newCount=apiMsgs.length;
            lastApiMsgCountRef.current[activeThread]=newCount;
            setThreads(prev=>{
              const current=prev[activeThread]||[];
              if(newCount>prevCount||prevCount===0){
                // API has new messages — merge, keeping local optimistic messages not yet in API
                const apiTextSet=new Set(apiMsgs.map(m=>m.text+m.ts));
                const localOnly=current.filter(m=>m.asHuman&&!apiTextSet.has(m.text+m.ts));
                return {...prev,[activeThread]:[...apiMsgs,...localOnly]};
              }
              // Count unchanged — preserve current state (don't wipe optimistic intervene msgs)
              return prev;
            });
          }
        }).catch(()=>{});
    };
    load();
    const id=setInterval(load,10000);
    return ()=>clearInterval(id);
  },[activeThread,teamIdMap]);

  useEffect(()=>{if(activeThread)setUnreadCounts(u=>({...u,[activeThread]:0}));},[activeThread]);
  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:'smooth',block:'end'});},[threads,typing,activeThread,liveCustomerMsgs]);

  const handleLogin=user=>{localStorage.setItem('donna-user',JSON.stringify(user));setLoggedIn(user);};
  const nowStr=()=>new Date(Date.now()+3*3600000).toISOString().slice(11,16);
  const addMessage=useCallback((threadId,msg)=>{
    setThreads(prev=>{
      const updated={...prev,[threadId]:[...(prev[threadId]||[]),{id:msgIdRef.current++,...msg}]};
      return updated;
    });
    // Persist donna thread messages to server for cross-device sync
    if(threadId==='donna'&&msg.text&&!msg.apiToolId){
      const direction=msg.from==='user'?'inbound':'outbound';
      authFetch('/api/admin/conversation/log',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({direction,content:msg.text})
      }).catch(()=>{});
    }
  },[]);

  const isTeamThread=!!teamIdMap[activeThread];
  const isCustomerThread=liveCustomers.some(c=>c.id===activeThread);
  const isReportThread=activeThread&&activeThread.startsWith('report_');
  const reportMemberId=isReportThread?activeThread.replace('report_',''):'';
  const reportMember=isReportThread?liveTeam.find(m=>m.id===reportMemberId):null;
  const reportWa=reportMember?reportMember.whatsapp:'';
  const activeMember=liveTeam.find(m=>m.id===activeThread);
  const activeCustomer=liveCustomers.find(c=>c.id===activeThread);
  const showReadOnly=(isTeamThread||isCustomerThread||isReportThread)&&!intervening;

  const filterCounts=useMemo(()=>({
    all:liveCustomers.length,
    active:liveCustomers.filter(c=>c.filter==='active').length,
    flagged:liveCustomers.filter(c=>c.filter==='flagged').length,
    waiting:liveCustomers.filter(c=>c.filter==='waiting').length,
  }),[liveCustomers]);

  const filteredCustomers=useMemo(()=>
    customerFilter==='all'?liveCustomers:liveCustomers.filter(c=>c.filter===customerFilter)
  ,[customerFilter,liveCustomers]);

  const handleSend=async()=>{
    if(!input.trim())return;
    const text=input.trim();
    setInput('');
    // Special command: test push notification
    if(text.toLowerCase()==='test push'&&loggedIn?.role==='admin'){
      addMessage('donna',{from:'user',text,ts:nowStr()});
      try{
        const r=await authFetch('/api/push/test',{method:'POST'});
        addMessage('donna',{from:'donna',
          text:r.ok?'✅ Test push sent to all subscribed devices. Check your device!':
               'Push test failed: '+(r.error||'unknown error'),
          ts:nowStr()});
      }catch(e){
        addMessage('donna',{from:'donna',text:'Push test error: '+e.message,ts:nowStr()});
      }
      return;
    }
    if((isCustomerThread||isTeamThread)&&intervening){
      if(isCustomerThread&&activeCustomer){
        try{
          // send-whatsapp with intervention:true already logs to customer_conversations
          await authFetch('/api/tools/send-whatsapp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:activeCustomer.phone,message:text,intervention:true})});
        }catch(e){console.warn('WA send failed:',e);}
      }else if(isTeamThread&&activeMember&&activeMember.whatsapp){
        try{
          await authFetch('/api/tools/send-whatsapp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:activeMember.whatsapp,message:text,intervention:true})});
        }catch(e){console.warn('Team WA send failed:',e);}
      }
      addMessage(activeThread,{from:'donna',text,ts:nowStr(),asHuman:true});
      return;
    }
    addMessage(activeThread,{from:'user',text,ts:nowStr()});
    setTyping(true);
    try{
      const data=await fetchApi('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,thread:'admin'})});
      setTyping(false);
      addMessage(activeThread,{from:'donna',text:data.response||'Done.',ts:nowStr()});
    }catch(e){
      setTyping(false);
      addMessage(activeThread,{from:'donna',text:`Error: ${e.message}`,ts:nowStr()});
    }
  };

  const triggerTool=async toolId=>{
    if(toolId==='wa_settings'){setShowWASettings(true);setToolsOpen(false);return;}
    setToolsOpen(false);
    if(activeThread!=='donna')setActiveThread('donna');
    setActiveTool(toolId);
    const label=TOOLS.flatMap(s=>s.items).find(i=>i.id===toolId)?.label||toolId;
    addMessage('donna',{from:'user',text:`Running: **${label}**`,ts:nowStr()});
    setTyping(true);
    const def=TOOL_API_MAP[toolId];
    if(!def){setTyping(false);return;}
    if(!def.ep){
      await new Promise(r=>setTimeout(r,300));
      setTyping(false);
      addMessage('donna',{from:'donna',text:typeof def.text==='function'?def.text(null):def.text,ts:nowStr(),apiToolId:toolId,apiData:null});
      return;
    }
    try{
      const data=await fetchApi(def.ep);
      setTyping(false);
      addMessage('donna',{from:'donna',text:typeof def.text==='function'?def.text(data):def.text,ts:nowStr(),apiToolId:toolId,apiData:data});
    }catch(e){
      setTyping(false);
      addMessage('donna',{from:'donna',text:`Could not load **${label}**: ${e.message}`,ts:nowStr()});
    }
  };

  const currentMsgs=threads[activeThread]||[];
  let threadLabel='Donna — AI Assistant';
  let threadSub='Powered by Claude';
  if(isReportThread&&reportMember){threadLabel=reportMember.name+' — EOD Reports';threadSub='Daily report history';}
  else if(activeMember){threadLabel=activeMember.name;threadSub=activeMember.status==='online'?'● Online':'● Away';}
  else if(activeCustomer){threadLabel=activeCustomer.name;threadSub=activeCustomer.company+' · '+activeCustomer.phone;}

  const prodUrl=(statusData.production_url||'').replace(/^https?:\/\//,'').replace(/\/.*$/,'')||'helpdesk.botsolutions.tech';

  const onInstall=React.useCallback(async()=>{
    if(!installPrompt) return;
    installPrompt.prompt();
    const {outcome}=await installPrompt.userChoice;
    if(outcome==='accepted'){setInstallDone(true);setInstallPrompt(null);localStorage.setItem('donna-installed','1');}
  },[installPrompt]);
  const sidebarProps={activeThread,setActiveThread,liveCustomers,escalations,unreadCounts,loggedIn,isDark,setIsDark,onClose:()=>setSidebarOpen(false),customerFilter,setCustomerFilter,filteredCustomers,filterCounts,liveTeam,installPrompt,onInstall,installDone};

  if(!authChecked)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg0)',color:'var(--text-3)',fontSize:13}}>Loading…</div>;
  if(!loggedIn) return <LoginScreen onLogin={handleLogin}/>;

  const ToolsPanelContent=<>
    <div style={{padding:'13px 16px 10px',borderBottom:'1px solid var(--border)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div style={{fontSize:12,fontWeight:600,color:'var(--text-2)',letterSpacing:'0.06em',textTransform:'uppercase'}}>Tools</div>
      <button onClick={()=>setToolsOpen(false)} className="mob-header-btn" style={{color:'var(--text-3)',background:'none',border:'none',cursor:'pointer',fontSize:18,lineHeight:1}}>✕</button>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'8px 8px',WebkitOverflowScrolling:'touch'}}>
      {TOOLS.filter(s=>!s.adminOnly||(loggedIn&&loggedIn.role==='admin')).map(s=><ToolSection key={s.section} section={s.section} items={s.items} onTrigger={triggerTool} activeId={activeTool}/>)}
    </div>
  </>;

  return <div className="app-shell">
    {/* Offline banner */}
    {statusFailCount>=3&&<div style={{position:'fixed',top:0,left:0,right:0,zIndex:1000,
      background:'var(--red)',color:'#fff',textAlign:'center',padding:'7px 16px',
      fontSize:12,fontWeight:600,letterSpacing:'0.03em',
      boxShadow:'0 2px 8px rgba(0,0,0,0.4)'}}>
      ⚠ Donna is offline — reconnecting…
    </div>}
    {/* Mobile overlay */}
    <div className={`overlay ${sidebarOpen||toolsOpen?'open':''}`} onClick={()=>{setSidebarOpen(false);setToolsOpen(false);}}/>

    <div className="app-body">
      {/* Sidebar */}
      <div className={`sidebar ${sidebarOpen?'open':''}`} id="sidebar-el">
        <Sidebar {...sidebarProps}/>
      </div>

      {/* Main */}
      <div className="main-area">
        {/* Chat column */}
        <div className="chat-col">
          {/* Header */}
          <div style={{padding:'11px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,background:'var(--bg1)',gap:10}}>
            {/* Hamburger / Back button */}
            {isMobile && activeThread && activeThread !== 'donna' ? (
              <button onClick={()=>setActiveThread('donna')} style={{
                display:'flex',alignItems:'center',gap:5,padding:'6px 8px',
                color:'var(--text-2)',background:'none',border:'none',cursor:'pointer',
                flexShrink:0,WebkitTapHighlightColor:'transparent'
              }}>
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <path d="M11 4L6 9L11 14" stroke="currentColor" strokeWidth="1.8"
                    strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                <span style={{fontSize:13,color:'var(--text-2)'}}>Back</span>
              </button>
            ) : (
              <button className="mob-header-btn" onClick={()=>setSidebarOpen(o=>!o)} style={{width:34,height:34,borderRadius:7,background:'var(--bg2)',border:'1px solid var(--border)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,flexShrink:0,cursor:'pointer',color:'var(--text-2)'}}>
                <span style={{width:14,height:1.5,background:'currentColor',borderRadius:1,display:'block'}}/>
                <span style={{width:14,height:1.5,background:'currentColor',borderRadius:1,display:'block'}}/>
                <span style={{width:10,height:1.5,background:'currentColor',borderRadius:1,display:'block',alignSelf:'flex-start',marginLeft:2}}/>
              </button>
            )}
            <div style={{minWidth:0,flex:1,position:'relative'}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{fontSize:14,fontWeight:600,color:'var(--text-1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{threadLabel}</div>
                {isCustomerThread&&<button onClick={()=>setEditingContact(editingContact===activeThread?null:activeThread)} style={{padding:'2px 7px',borderRadius:4,background:'var(--bg2)',border:'1px solid var(--border)',color:'var(--text-3)',fontSize:10,cursor:'pointer',flexShrink:0}}>{editingContact===activeThread?'✕':'Edit'}</button>}
              </div>
              <div style={{fontSize:11,color:'var(--text-3)',marginTop:1,display:'flex',alignItems:'center',gap:6}}>
                {activeCustomer&&<span style={{display:'inline-flex',alignItems:'center',gap:4,background:'#25d36620',color:'#25d366',borderRadius:4,padding:'1px 7px',fontSize:10,fontWeight:600}}>
                  <svg width="9" height="9" viewBox="0 0 14 14" fill="none"><path d="M7 1C3.7 1 1 3.7 1 7c0 1.1.3 2.1.9 3L1 13l3.2-.9C5.3 12.7 6.1 13 7 13c3.3 0 6-2.7 6-6S10.3 1 7 1Z" stroke="currentColor" strokeWidth="1.3" fill="none"/></svg>WhatsApp
                </span>}
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{threadSub}</span>
              </div>
              {editingContact===activeThread&&isCustomerThread&&<ContactEditPanel
                phone={activeCustomer?.phone||activeThread}
                onClose={()=>setEditingContact(null)}
                onSave={()=>{setEditingContact(null);setCustomerRefreshKey(k=>k+1);}}
              />}
            </div>
            <button onClick={()=>{setShowNotifPanel(o=>!o);if(unreadNotifs>0){authFetch('/api/notifications/read',{method:'POST'}).catch(()=>{});setUnreadNotifs(0);}}} style={{position:'relative',width:34,height:34,borderRadius:7,background:showNotifPanel?'var(--bg3)':'var(--bg2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'var(--text-2)',flexShrink:0}} title="Notifications">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2z" fill={unreadNotifs>0?'var(--amber)':'currentColor'} opacity={unreadNotifs>0?1:0.4}/>
                <path d="M18 16v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" stroke="currentColor" strokeWidth="1.5" fill={unreadNotifs>0?'var(--amber-dim)':'none'}/>
              </svg>
              {unreadNotifs>0&&<span style={{position:'absolute',top:5,right:5,width:7,height:7,borderRadius:'50%',background:'var(--red)',border:'2px solid var(--bg1)'}}/>}
            </button>
            <div className="header-user-pill" style={{display:'flex',alignItems:'center',gap:7,padding:'5px 10px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,flexShrink:0}}>
              <div style={{width:22,height:22,borderRadius:'50%',background:'var(--teal-dim)',border:'1px solid var(--teal)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'var(--teal)'}}>{loggedIn.initials}</div>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text-1)'}}>{loggedIn.name}</div>
            </div>
          </div>

          {/* Messages */}
          <div style={{flex:1,overflowY:'auto',padding:'16px 16px 8px',WebkitOverflowScrolling:'touch'}}>
            {isReportThread&&reportMember&&<ReportDetailPanel reportWa={reportWa} memberName={reportMember.name} isDark={isDark}/>}
            {!isReportThread&&isCustomerThread&&intervening&&<div style={{margin:'0 0 16px',padding:'10px 14px',background:'var(--amber-dim)',border:'1px solid rgba(245,166,35,0.25)',borderRadius:8,display:'flex',alignItems:'center',gap:8,fontSize:12}}>
              <span>👤</span><span style={{color:'var(--amber)',fontWeight:500}}>Human agent mode — Donna paused</span>
            </div>}
            {!isReportThread&&isCustomerThread
              ?liveCustomerMsgs.map(msg=><ChatMessage key={msg.id} msg={msg} isCustomerThread={true}/>)
              :currentMsgs.map(msg=><ChatMessage key={msg.id} msg={msg} isCustomerThread={false}/>)}
            {typing&&<TypingIndicator/>}
            <div ref={chatEndRef}/>
          </div>

          {/* Input */}
          {showReadOnly?(
            <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',background:'var(--bg1)',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
              <div style={{flex:1,padding:'10px 14px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,fontSize:12,color:'var(--text-3)',display:'flex',alignItems:'center',gap:6}}>
                <svg width="12" height="12" viewBox="0 0 14 14" fill="none" style={{flexShrink:0}}><rect x="2" y="6" width="10" height="7" rx="1.5" stroke="currentColor" strokeWidth="1.3" fill="none"/><path d="M4.5 6V4.5a2.5 2.5 0 0 1 5 0V6" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
                {isCustomerThread?<span>Donna handling this · tap Intervene to take over</span>:<span>Read-only — Donna's view</span>}
              </div>
              <button onClick={async()=>{
                if(isCustomerThread){
                  const esc=escalations.find(e=>e.phone_number===activeThread);
                  if(esc){try{await fetchApi(`/api/escalations/${esc.id}/take`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent_name:loggedIn.name||'Admin'})});}catch(e){console.warn(e);}}
                }
                setIntervening(true);
              }} style={{padding:'10px 14px',background:'var(--amber-dim)',border:'1px solid rgba(245,166,35,0.3)',borderRadius:9,fontSize:12,fontWeight:600,color:'var(--amber)',cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>
                Intervene
              </button>
            </div>
          ):(
            <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',background:'var(--bg1)',flexShrink:0}}>
              {intervening&&<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,padding:'6px 10px',background:'var(--amber-dim)',border:'1px solid rgba(245,166,35,0.25)',borderRadius:7}}>
                <span style={{fontSize:11,color:'var(--amber)'}}>⚡ {isCustomerThread?`Replying as human to ${activeCustomer?.name}`:'Intervening as Donna'}</span>
                <button onClick={()=>setIntervening(false)} style={{fontSize:11,color:'var(--amber)',cursor:'pointer',background:'none',border:'none'}}>Cancel</button>
              </div>}
              <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
                <textarea value={input} onChange={e=>setInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}}}
                  placeholder={isCustomerThread&&intervening?`Reply to ${activeCustomer?.name}...`:'Ask Donna anything...'}
                  rows={1}
                  style={{width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'11px 14px',color:'var(--text-1)',fontSize:14,resize:'none',outline:'none',lineHeight:1.5,fontFamily:'var(--sans)',transition:'border-color 0.15s'}}
                  onFocus={e=>e.target.style.borderColor='var(--teal)'}
                  onBlur={e=>e.target.style.borderColor='var(--border)'}/>
                <button onClick={handleSend} style={{width:40,height:40,borderRadius:9,background:intervening?'var(--amber)':'var(--teal)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,opacity:input.trim()?1:0.5,transition:'opacity 0.15s',border:'none',cursor:'pointer'}}>
                  <svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M1 7L13 7M13 7L8 2M13 7L8 12" stroke="#000" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </button>
              </div>
              <div style={{fontSize:10,color:'var(--text-3)',marginTop:5,paddingLeft:2}}>Enter to send · Shift+Enter for new line</div>
            </div>
          )}
        </div>

        {/* Tools panel — desktop only */}
        <div className={`tools-panel ${toolsOpen?'open':''}`}>
          {/* Mobile drag handle — only rendered on mobile */}
          {isMobile&&<div onClick={()=>setToolsOpen(false)} style={{
            display:'flex',justifyContent:'center',alignItems:'center',
            padding:'10px 0 6px',cursor:'pointer',flexShrink:0
          }}>
            <div style={{width:36,height:4,borderRadius:2,background:'var(--border-hi)'}}/>
          </div>}
          {ToolsPanelContent}
        </div>
      </div>
    </div>

    {/* Status bar — desktop only */}
    <div className="status-bar" style={{height:28,flexShrink:0,background:'var(--bg1)',borderTop:'1px solid var(--border)',display:'flex',alignItems:'center',paddingLeft:16,paddingRight:16,fontSize:11,fontFamily:'var(--mono)',color:'var(--text-3)'}}>
      <div style={{display:'flex',alignItems:'center',gap:5}}>
        <span style={{width:6,height:6,borderRadius:'50%',background:statusData.donna_active?'var(--green)':'var(--amber)',display:'inline-block',boxShadow:statusData.donna_active?'0 0 4px var(--green)':'none'}}/>
        <span style={{color:'var(--text-2)'}}>Donna {statusData.donna_active?'active':'offline'}</span>
      </div>
      <Divider/><span>Sync: <span style={{color:'var(--text-2)'}}>{statusData.last_sync||'—'}</span></span>
      <Divider/><span><span style={{color:'var(--teal)'}}>{prodUrl}</span></span>
      <Divider/>
      {statusData.alerts>0
        ?<span style={{color:'var(--red)'}}>{statusData.alerts} alert{statusData.alerts!==1?'s':''}</span>
        :<span style={{color:'var(--green)'}}>All clear</span>}
      <div style={{flex:1}}/>
      <span>{new Date(Date.now()+3*3600000).toISOString().slice(0,16).replace('T',' ')} KSA</span>
    </div>

    {/* Mobile bottom nav */}
    <div className="mob-nav">
      <button className={`mob-nav-btn ${activeThread==='donna'&&!sidebarOpen&&!toolsOpen?'active':''}`} onClick={()=>{setSidebarOpen(false);setToolsOpen(false);setActiveThread('donna');}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="currentColor" strokeWidth="1.8"/><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="1.5" opacity="0.5"/></svg>
        Donna
      </button>
      <button className={`mob-nav-btn ${sidebarOpen?'active':''}`} onClick={()=>{setToolsOpen(false);setSidebarOpen(o=>!o);}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3" stroke="currentColor" strokeWidth="1.8"/><circle cx="9" cy="16" r="3" stroke="currentColor" strokeWidth="1.8"/><circle cx="17" cy="12" r="3" stroke="currentColor" strokeWidth="1.8"/></svg>
        Chats
        {Object.values(unreadCounts).some(v=>v>0)&&<span style={{position:'absolute',top:6,right:'calc(25% - 6px)',width:8,height:8,borderRadius:'50%',background:'var(--teal)',border:'2px solid var(--bg1)'}}/>}
      </button>
      <button className={`mob-nav-btn ${toolsOpen?'active':''}`} onClick={()=>{setSidebarOpen(false);setToolsOpen(o=>!o);}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" stroke="currentColor" strokeWidth="1.8"/><rect x="13" y="3" width="8" height="8" rx="2" stroke="currentColor" strokeWidth="1.8"/><rect x="3" y="13" width="8" height="8" rx="2" stroke="currentColor" strokeWidth="1.8"/><rect x="13" y="13" width="8" height="8" rx="2" stroke="currentColor" strokeWidth="1.8"/></svg>
        Tools
      </button>
      {pushSupported&&<button className={`mob-nav-btn ${pushEnabled?'active':''}`} onClick={()=>pushEnabled?disablePush():enablePush()} disabled={pushLoading} title={pushEnabled?'Disable push notifications':'Enable push notifications'}>
        {pushEnabled
          ?<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a7 7 0 0 1 7 7v4l1.4 2.1A1 1 0 0 1 19.5 17H4.5a1 1 0 0 1-.9-1.4L5 13V9a7 7 0 0 1 7-7zm0 20a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2z"/></svg>
          :<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2a7 7 0 0 1 7 7v4l1.4 2.1A1 1 0 0 1 19.5 17H4.5a1 1 0 0 1-.9-1.4L5 13V9a7 7 0 0 1 7-7zm0 20a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2z" stroke="currentColor" strokeWidth="1.6"/><line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>}
        {pushLoading?'…':pushEnabled?'Alerts On':'Alerts'}
      </button>}
      {!pushSupported&&<button className={`mob-nav-btn`} onClick={()=>{const _s=localStorage.getItem('donna-user');if(_s){const _t=JSON.parse(_s).token;if(_t)fetch(API+'/api/auth/logout-token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:_t})}).catch(()=>{});}localStorage.removeItem('donna-user');window.location.reload();}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" strokeWidth="1.8"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
        {loggedIn.initials}
      </button>}
    </div>
  {showWASettings&&loggedIn?.role==='admin'&&
    <WhatsAppSettingsPanel onClose={()=>setShowWASettings(false)}/>}
  {showNotifPanel&&<div style={{
    position:'fixed',top:52,right:16,width:320,maxWidth:'calc(100vw - 32px)',
    background:'var(--bg1)',border:'1px solid var(--border-hi)',
    borderRadius:12,boxShadow:'0 8px 40px rgba(0,0,0,0.6)',
    zIndex:400,overflow:'hidden',maxHeight:480,display:'flex',flexDirection:'column'
  }}>
    <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',
      display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
      <span style={{fontSize:13,fontWeight:600,color:'var(--text-1)'}}>Notifications</span>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {notifications.length>0&&<button onClick={()=>{authFetch('/api/notifications/clear-all',{method:'POST'}).catch(()=>{});setNotifications([]);setUnreadNotifs(0);}} style={{fontSize:10,color:'var(--text-3)',cursor:'pointer',background:'none',border:'1px solid var(--border)',borderRadius:4,padding:'2px 7px',lineHeight:1.5}}>Clear all</button>}
        <button onClick={()=>setShowNotifPanel(false)} style={{color:'var(--text-3)',fontSize:16,cursor:'pointer',background:'none',border:'none',lineHeight:1}}>✕</button>
      </div>
    </div>
    <div style={{overflowY:'auto',flex:1}}>
      {notifications.length===0&&<div style={{padding:20,textAlign:'center',
        color:'var(--text-3)',fontSize:13}}>No notifications yet</div>}
      {notifications.map(n=>{
        const catColor={alert:'var(--red)',warning:'var(--amber)',
          report:'var(--teal)',briefing:'var(--green)',info:'var(--text-3)'}[n.category]||'var(--text-3)';
        return <div key={n.id} style={{padding:'12px 16px',
          borderBottom:'1px solid var(--border)',
          background:n.read?'transparent':'var(--bg2)',
          display:'flex',alignItems:'flex-start',gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:catColor,marginBottom:3}}>{n.title}</div>
            {n.body&&<div style={{fontSize:11,color:'var(--text-2)',lineHeight:1.5,
              whiteSpace:'pre-wrap'}}>{n.body.slice(0,200)}</div>}
            <div style={{fontSize:10,color:'var(--text-3)',marginTop:4,
              fontFamily:'var(--mono)'}}>{(n.timestamp||'').slice(0,16)}</div>
          </div>
          <button onClick={()=>{authFetch(`/api/notifications/${n.id}`,{method:'DELETE'}).catch(()=>{});setNotifications(prev=>prev.filter(x=>x.id!==n.id));}} title="Dismiss" style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-3)',fontSize:14,padding:'0 2px',flexShrink:0,lineHeight:1,opacity:0.6}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0.6}>✕</button>
        </div>;
      })}
    </div>
  </div>}
  </div>;
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){
    if(this.state.error) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#060d1a',color:'#f25c54',flexDirection:'column',gap:12,padding:24,textAlign:'center'}}>
      <div style={{fontSize:24}}>⚠</div>
      <div style={{fontSize:14,fontWeight:600}}>Donna encountered an error</div>
      <div style={{fontSize:12,color:'#7a96b8',maxWidth:400}}>{this.state.error.message}</div>
      <button onClick={()=>window.location.reload()} style={{marginTop:8,padding:'10px 20px',background:'#0ec4b4',color:'#000',borderRadius:8,fontSize:14,fontWeight:600,cursor:'pointer',border:'none'}}>Reload</button>
    </div>;
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);

// PWA Service Worker registration
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js',{scope:'/'})
      .then(r=>console.log('Donna SW:',r.scope))
      .catch(e=>console.warn('SW failed:',e));
  });
}
</script>
</body>
